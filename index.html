<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅行規劃師 - Travel Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Icons
        const MapPin = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
            </svg>
        );

        const Calendar = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
        );

        const Plus = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
            </svg>
        );

        const Edit = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
            </svg>
        );

        const Trash = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
        );

        const LogOut = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
        );

        const ExternalLink = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
            </svg>
        );

        const Users = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
        );

        const DollarSign = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        );

        const X = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
            </svg>
        );

        // 登入頁面
        function LoginPage({ onLogin }) {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [isRegister, setIsRegister] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!username || !password) {
                    alert('請輸入使用者名稱和密碼');
                    return;
                }

                const users = JSON.parse(localStorage.getItem('users') || '{}');
                
                if (isRegister) {
                    if (users[username]) {
                        alert('使用者名稱已存在');
                        return;
                    }
                    users[username] = { password, role: 'user' };
                    localStorage.setItem('users', JSON.stringify(users));
                    alert('註冊成功！請登入');
                    setIsRegister(false);
                } else {
                    if (!users[username] || users[username].password !== password) {
                        alert('使用者名稱或密碼錯誤');
                        return;
                    }
                    const userData = { username, role: users[username].role };
                    // 儲存登入狀態到 localStorage（保持登入）
                    localStorage.setItem('currentUser', JSON.stringify(userData));
                    onLogin(userData);
                }
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 via-purple-50 to-pink-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
                        <div className="text-center mb-8">
                            <div className="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                                <MapPin className="w-10 h-10 text-white" />
                            </div>
                            <h1 className="text-3xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
                                旅行規劃師
                            </h1>
                            <p className="text-gray-600 mt-2">
                                {isRegister ? '建立新帳號' : '登入你的帳號'}
                            </p>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">
                                    使用者名稱
                                </label>
                                <input
                                    type="text"
                                    value={username}
                                    onChange={(e) => setUsername(e.target.value)}
                                    className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                    placeholder="輸入使用者名稱"
                                />
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">
                                    密碼
                                </label>
                                <input
                                    type="password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                    placeholder="輸入密碼"
                                />
                            </div>

                            <button
                                type="submit"
                                className="w-full bg-gradient-to-r from-blue-500 to-purple-600 text-white py-3 rounded-lg font-semibold hover:shadow-lg transition-all"
                            >
                                {isRegister ? '註冊' : '登入'}
                            </button>
                        </form>

                        <div className="mt-6 text-center">
                            <button
                                onClick={() => setIsRegister(!isRegister)}
                                className="text-blue-600 hover:text-blue-800"
                            >
                                {isRegister ? '已有帳號？登入' : '沒有帳號？註冊'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // 主應用程式
        function TravelApp() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('itinerary');
            const [selectedDate, setSelectedDate] = useState('all'); // 用於日期篩選
            
            // 共享資料
            const [sharedTodoItems, setSharedTodoItems] = useState([]);
            const [sharedItinerary, setSharedItinerary] = useState([]);
            
            // 個人資料
            const [personalPackingItems, setPersonalPackingItems] = useState([]);
            const [expenses, setExpenses] = useState([]);
            
            // 分帳系統
            const [splitBillData, setSplitBillData] = useState({
                members: [],
                publicBudget: 3280,
                expenses: []
            });

            // 編輯模式
            const [editingTodoItem, setEditingTodoItem] = useState(null);
            const [editText, setEditText] = useState('');

            // 行程表單
            const [showItineraryForm, setShowItineraryForm] = useState(false);
            const [editingItinerary, setEditingItinerary] = useState(null);

            // 分帳彈窗
            const [showMemberSelect, setShowMemberSelect] = useState(false);
            const [showExpenseForm, setShowExpenseForm] = useState(false);

            // 待辦清單表單
            const [showTodoForm, setShowTodoForm] = useState(false);

            // 整理行李表單
            const [showPackingForm, setShowPackingForm] = useState(false);

            // 記帳表單
            const [showPersonalExpenseForm, setShowPersonalExpenseForm] = useState(false);

            // 初始化測試帳號
            useEffect(() => {
                const users = JSON.parse(localStorage.getItem('users') || '{}');
                if (Object.keys(users).length === 0) {
                    users['admin'] = { password: 'admin123', role: 'admin' };
                    users['user'] = { password: 'user123', role: 'user' };
                    localStorage.setItem('users', JSON.stringify(users));
                }

                // 檢查是否有已登入的用戶
                const currentUser = localStorage.getItem('currentUser');
                if (currentUser) {
                    setUser(JSON.parse(currentUser));
                }
            }, []);

            // 載入共享資料
            useEffect(() => {
                const sharedData = JSON.parse(localStorage.getItem('sharedData') || '{}');
                setSharedTodoItems(sharedData.todoItems || [
                    { id: 1, text: '訂機票', completed: true, priority: true },
                    { id: 2, text: '訂飯店', completed: true, priority: true },
                    { id: 3, text: '申請簽證', completed: false, priority: true }
                ]);
                setSharedItinerary(sharedData.itinerary || [
                    {
                        id: 1,
                        day: 1,
                        date: '2026-02-01',
                        title: '東京淺草寺',
                        time: '09:00',
                        location: '東京都台東區淺草2-3-1',
                        description: '東京最古老的寺廟，必訪景點',
                        mapUrl: 'https://maps.google.com/?q=淺草寺',
                        websiteUrl: 'https://www.senso-ji.jp/',
                        category: 'attraction'
                    }
                ]);
                setSplitBillData(sharedData.splitBill || {
                    members: [],
                    publicBudget: 3280,
                    expenses: []
                });
            }, []);

            // 載入個人資料
            useEffect(() => {
                if (user) {
                    const userData = JSON.parse(localStorage.getItem(`userData_${user.username}`) || '{}');
                    setPersonalPackingItems(userData.packingItems || [
                        { id: 1, text: '充電線', completed: false },
                        { id: 2, text: '行充', completed: false },
                        { id: 3, text: '梳子', completed: false }
                    ]);
                    setExpenses(userData.expenses || []);
                }
            }, [user]);

            // 儲存共享資料
            const saveSharedData = () => {
                const sharedData = {
                    todoItems: sharedTodoItems,
                    itinerary: sharedItinerary,
                    splitBill: splitBillData
                };
                localStorage.setItem('sharedData', JSON.stringify(sharedData));
            };

            // 儲存個人資料
            const savePersonalData = () => {
                if (user) {
                    const userData = {
                        packingItems: personalPackingItems,
                        expenses
                    };
                    localStorage.setItem(`userData_${user.username}`, JSON.stringify(userData));
                }
            };

            useEffect(() => {
                saveSharedData();
            }, [sharedTodoItems, sharedItinerary, splitBillData]);

            useEffect(() => {
                savePersonalData();
            }, [personalPackingItems, expenses]);

            if (!user) {
                return <LoginPage onLogin={setUser} />;
            }

            // 登出功能
            const handleLogout = () => {
                localStorage.removeItem('currentUser');
                setUser(null);
            };

            // 獲取所有註冊用戶
            const getAllUsers = () => {
                const users = JSON.parse(localStorage.getItem('users') || '{}');
                return Object.keys(users);
            };

            // 計算分帳
            const calculateSplit = () => {
                if (splitBillData.members.length === 0) {
                    return { total: 0, average: 0, memberDebts: {} };
                }

                const total = splitBillData.expenses.reduce((sum, e) => sum + e.amount, 0);
                const memberCount = splitBillData.members.length;
                const average = total / memberCount;
                
                const memberDebts = {};
                splitBillData.members.forEach(member => {
                    const paid = splitBillData.expenses
                        .filter(e => e.payer === member)
                        .reduce((sum, e) => sum + e.amount, 0);
                    memberDebts[member] = paid - average;
                });
                
                return { total, average, memberDebts };
            };

            const { total: splitTotal, average: splitAverage, memberDebts } = calculateSplit();

            const todoProgress = sharedTodoItems.length > 0 
                ? Math.round((sharedTodoItems.filter(item => item.completed).length / sharedTodoItems.length) * 100)
                : 0;

            const packingProgress = personalPackingItems.length > 0
                ? Math.round((personalPackingItems.filter(item => item.completed).length / personalPackingItems.length) * 100)
                : 0;

            // 處理行程表單提交
            const handleItinerarySubmit = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const itineraryData = {
                    id: editingItinerary ? editingItinerary.id : Date.now(),
                    day: editingItinerary ? editingItinerary.day : sharedItinerary.length + 1,
                    date: formData.get('date'),
                    title: formData.get('title'),
                    time: formData.get('time'),
                    location: formData.get('location'),
                    description: formData.get('description'),
                    mapUrl: formData.get('mapUrl'),
                    websiteUrl: formData.get('websiteUrl'),
                    category: 'attraction'
                };

                if (editingItinerary) {
                    // 編輯模式
                    setSharedItinerary(sharedItinerary.map(item =>
                        item.id === editingItinerary.id ? itineraryData : item
                    ));
                } else {
                    // 新增模式
                    setSharedItinerary([...sharedItinerary, itineraryData]);
                }

                // 切換到該日期的標籤
                setSelectedDate(itineraryData.date);
                setShowItineraryForm(false);
                setEditingItinerary(null);
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 via-purple-50 to-pink-50">
                    {/* Header */}
                    <header className="bg-white shadow-md sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 py-4">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
                                        <MapPin className="w-6 h-6 text-white" />
                                    </div>
                                    <h1 className="text-2xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
                                        旅行規劃師
                                    </h1>
                                </div>
                                <div className="flex items-center gap-4">
                                    <span className="text-sm text-gray-600">
                                        歡迎, <strong>{user.username}</strong>
                                        {user.role === 'admin' && ' (管理員)'}
                                    </span>
                                    <button
                                        onClick={handleLogout}
                                        className="flex items-center gap-2 px-3 py-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors"
                                    >
                                        <LogOut className="w-4 h-4" />
                                        登出
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Navigation */}
                    <div className="max-w-7xl mx-auto px-4 py-6">
                        <div className="bg-white rounded-xl shadow-sm p-2 flex gap-2 overflow-x-auto">
                            {[
                                { id: 'itinerary', name: '行程規劃', icon: Calendar },
                                { id: 'checklist', name: '準備清單', icon: '📋' },
                                { id: 'currency', name: '匯率換算', icon: '💱' },
                                { id: 'expenses', name: '記帳本', icon: DollarSign },
                                { id: 'split', name: '分帳本', icon: Users }
                            ].map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`flex items-center gap-2 px-4 py-2 rounded-lg transition-all whitespace-nowrap ${
                                        activeTab === tab.id
                                            ? 'bg-gradient-to-r from-blue-500 to-purple-600 text-white shadow-md'
                                            : 'text-gray-600 hover:bg-gray-100'
                                    }`}
                                >
                                    {typeof tab.icon === 'string' ? (
                                        <span>{tab.icon}</span>
                                    ) : (
                                        <tab.icon className="w-4 h-4" />
                                    )}
                                    {tab.name}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="max-w-7xl mx-auto px-4 pb-12">
                        {/* 行程規劃 */}
                        {activeTab === 'itinerary' && (
                            <div className="space-y-6">
                                <div className="bg-white rounded-2xl shadow-lg p-8">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-2xl font-bold text-gray-800">🗓️ 行程規劃</h2>
                                        {user.role === 'admin' && (
                                            <button
                                                onClick={() => {
                                                    setEditingItinerary(null);
                                                    setShowItineraryForm(true);
                                                }}
                                                className="flex items-center gap-2 px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600"
                                            >
                                                <Plus className="w-4 h-4" />
                                                新增行程
                                            </button>
                                        )}
                                    </div>

                                    {/* 日期篩選按鈕 */}
                                    {sharedItinerary.length > 0 && (
                                        <div className="mb-6 flex gap-2 overflow-x-auto pb-2">
                                            <button
                                                onClick={() => setSelectedDate('all')}
                                                className={`px-4 py-2 rounded-lg font-semibold whitespace-nowrap transition-all ${
                                                    selectedDate === 'all'
                                                        ? 'bg-blue-600 text-white shadow-md'
                                                        : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                                                }`}
                                            >
                                                全部行程
                                            </button>
                                            {[...new Set(sharedItinerary.map(item => item.date))].sort().map(date => (
                                                <button
                                                    key={date}
                                                    onClick={() => setSelectedDate(date)}
                                                    className={`px-4 py-2 rounded-lg font-semibold whitespace-nowrap transition-all ${
                                                        selectedDate === date
                                                            ? 'bg-blue-600 text-white shadow-md'
                                                            : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                                                    }`}
                                                >
                                                    📅 {date}
                                                </button>
                                            ))}
                                        </div>
                                    )}

                                    <div className="space-y-4">
                                        {sharedItinerary
                                            .filter(item => selectedDate === 'all' || item.date === selectedDate)
                                            .map(item => (
                                            <div key={item.id} className="border-2 border-blue-200 rounded-xl p-6 hover:shadow-lg transition-all">
                                                <div className="flex justify-between items-start">
                                                    <div className="flex-1">
                                                        <div className="flex items-center gap-3 mb-3">
                                                            <span className="text-gray-600 font-semibold">{item.date}</span>
                                                            <span className="text-gray-600">{item.time}</span>
                                                        </div>
                                                        <h3 className="text-xl font-bold text-gray-800 mb-2">{item.title}</h3>
                                                        <p className="text-gray-600 mb-2">📍 {item.location}</p>
                                                        <p className="text-gray-700 mb-4">{item.description}</p>
                                                        
                                                        <div className="flex gap-3">
                                                            {item.mapUrl && (
                                                                <a
                                                                    href={item.mapUrl}
                                                                    target="_blank"
                                                                    rel="noopener noreferrer"
                                                                    className="flex items-center gap-2 px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600"
                                                                >
                                                                    <MapPin className="w-4 h-4" />
                                                                    開啟地圖
                                                                    <ExternalLink className="w-3 h-3" />
                                                                </a>
                                                            )}
                                                            {item.websiteUrl && (
                                                                <a
                                                                    href={item.websiteUrl}
                                                                    target="_blank"
                                                                    rel="noopener noreferrer"
                                                                    className="flex items-center gap-2 px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600"
                                                                >
                                                                    查看網站
                                                                    <ExternalLink className="w-3 h-3" />
                                                                </a>
                                                            )}
                                                        </div>
                                                    </div>
                                                    {user.role === 'admin' && (
                                                        <div className="flex gap-2">
                                                            <button
                                                                onClick={() => {
                                                                    setEditingItinerary(item);
                                                                    setShowItineraryForm(true);
                                                                }}
                                                                className="text-blue-500 hover:bg-blue-50 p-2 rounded-lg"
                                                            >
                                                                <Edit className="w-5 h-5" />
                                                            </button>
                                                            <button
                                                                onClick={() => {
                                                                    if (confirm('確定要刪除此行程嗎？')) {
                                                                        setSharedItinerary(sharedItinerary.filter(i => i.id !== item.id));
                                                                    }
                                                                }}
                                                                className="text-red-500 hover:bg-red-50 p-2 rounded-lg"
                                                            >
                                                                <Trash className="w-5 h-5" />
                                                            </button>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    {sharedItinerary.filter(item => selectedDate === 'all' || item.date === selectedDate).length === 0 && (
                                        <p className="text-gray-400 text-center py-12">
                                            {sharedItinerary.length === 0
                                                ? (user.role === 'admin' 
                                                    ? '尚未新增行程，點擊上方按鈕開始規劃！' 
                                                    : '目前還沒有行程規劃')
                                                : '此日期沒有行程'
                                            }
                                        </p>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* 準備清單 */}
                        {activeTab === 'checklist' && (
                            <div className="space-y-6">
                                {/* 待辦清單 - 共享 */}
                                <div className="bg-white rounded-2xl shadow-lg p-8">
                                    <div className="flex justify-between items-center mb-4">
                                        <h2 className="text-2xl font-bold text-gray-800">📋 待辦清單 TO-DO</h2>

                                    </button>
                                </div>

                                <form onSubmit={handleItinerarySubmit} className="space-y-4">
                                    <div className="grid md:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                日期 *
                                            </label>
                                            <input
                                                type="date"
                                                name="date"
                                                defaultValue={editingItinerary?.date || ''}
                                                required
                                                className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                            />
                                        </div>

                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                時間 *
                                            </label>
                                            <input
                                                type="time"
                                                name="time"
                                                defaultValue={editingItinerary?.time || ''}
                                                required
                                                className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                            />
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            行程名稱 *
                                        </label>
                                        <input
                                            type="text"
                                            name="title"
                                            defaultValue={editingItinerary?.title || ''}
                                            required
                                            placeholder="例如: 東京淺草寺"
                                            className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            地點 *
                                        </label>
                                        <input
                                            type="text"
                                            name="location"
                                            defaultValue={editingItinerary?.location || ''}
                                            required
                                            placeholder="例如: 東京都台東區淺草2-3-1"
                                            className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            描述 *
                                        </label>
                                        <textarea
                                            name="description"
                                            defaultValue={editingItinerary?.description || ''}
                                            required
                                            rows="3"
                                            placeholder="例如: 東京最古老的寺廟，必訪景點"
                                            className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            Google Maps 連結 (選填)
                                        </label>
                                        <input
                                            type="url"
                                            name="mapUrl"
                                            defaultValue={editingItinerary?.mapUrl || ''}
                                            placeholder="https://maps.google.com/?q=..."
                                            className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            網站連結 (選填)
                                        </label>
                                        <input
                                            type="url"
                                            name="websiteUrl"
                                            defaultValue={editingItinerary?.websiteUrl || ''}
                                            placeholder="https://..."
                                            className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                        />
                                    </div>

                                    <div className="flex gap-3 pt-4">
                                        <button
                                            type="button"
                                            onClick={() => {
                                                setShowItineraryForm(false);
                                                setEditingItinerary(null);
                                            }}
                                            className="flex-1 py-3 border-2 border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 font-semibold"
                                        >
                                            取消
                                        </button>
                                        <button
                                            type="submit"
                                            className="flex-1 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold"
                                        >
                                            {editingItinerary ? '儲存' : '確認'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* 成員選擇彈窗 */}
                    {showMemberSelect && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-2xl max-w-md w-full p-6">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xl font-bold">選擇分帳成員</h3>
                                    <button onClick={() => setShowMemberSelect(false)} className="p-2 hover:bg-gray-100 rounded-lg">
                                        <X className="w-5 h-5" />
                                    </button>
                                </div>

                                <div className="space-y-3 mb-6">
                                    {getAllUsers().map(username => (
                                        <label key={username} className="flex items-center gap-3 p-3 border-2 border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50">
                                            <input
                                                type="checkbox"
                                                checked={splitBillData.members.includes(username)}
                                                onChange={(e) => {
                                                    if (e.target.checked) {
                                                        setSplitBillData({
                                                            ...splitBillData,
                                                            members: [...splitBillData.members, username]
                                                        });
                                                    } else {
                                                        setSplitBillData({
                                                            ...splitBillData,
                                                            members: splitBillData.members.filter(m => m !== username)
                                                        });
                                                    }
                                                }}
                                                className="w-5 h-5 text-purple-600"
                                            />
                                            <div className="flex items-center gap-3 flex-1">
                                                <div className="w-10 h-10 bg-purple-600 rounded-full flex items-center justify-center text-white font-bold">
                                                    {username[0].toUpperCase()}
                                                </div>
                                                <span className="font-semibold">{username}</span>
                                            </div>
                                        </label>
                                    ))}
                                </div>

                                <div className="mb-4">
                                    <label className="block text-sm font-medium text-gray-700 mb-2">
                                        公費額度 (每人)
                                    </label>
                                    <input
                                        type="number"
                                        value={splitBillData.publicBudget}
                                        onChange={(e) => setSplitBillData({
                                            ...splitBillData,
                                            publicBudget: parseInt(e.target.value) || 0
                                        })}
                                        className="w-full px-4 py-2 border border-gray-300 rounded-lg"
                                        placeholder="例如: 3280"
                                    />
                                </div>

                                <button
                                    onClick={() => setShowMemberSelect(false)}
                                    className="w-full py-3 bg-purple-600 text-white rounded-lg hover:bg-purple-700 font-semibold"
                                >
                                    確認
                                </button>
                            </div>
                        </div>
                    )}

                    {/* 新增支出彈窗 */}
                    {showExpenseForm && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-2xl max-w-md w-full p-6">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xl font-bold">新增支出</h3>
                                    <button onClick={() => setShowExpenseForm(false)} className="p-2 hover:bg-gray-100 rounded-lg">
                                        <X className="w-5 h-5" />
                                    </button>
                                </div>

                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const formData = new FormData(e.target);
                                    const expense = {
                                        id: Date.now(),
                                        item: formData.get('item'),
                                        amount: parseFloat(formData.get('amount')),
                                        payer: formData.get('payer'),
                                        category: formData.get('category')
                                    };
                                    
                                    setSplitBillData({
                                        ...splitBillData,
                                        expenses: [...splitBillData.expenses, expense]
                                    });
                                    setShowExpenseForm(false);
                                }}>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                項目名稱
                                            </label>
                                            <input
                                                type="text"
                                                name="item"
                                                required
                                                className="w-full px-4 py-2 border border-gray-300 rounded-lg"
                                                placeholder="例如: 飯店住宿"
                                            />
                                        </div>

                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                金額 (TWD)
                                            </label>
                                            <input
                                                type="number"
                                                name="amount"
                                                required
                                                className="w-full px-4 py-2 border border-gray-300 rounded-lg"
                                                placeholder="例如: 5000"
                                            />
                                        </div>

                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                付款人
                                            </label>
                                            <select
                                                name="payer"
                                                required
                                                className="w-full px-4 py-2 border border-gray-300 rounded-lg"
                                            >
                                                <option value="">選擇付款人</option>
                                                {splitBillData.members.map(member => (
                                                    <option key={member} value={member}>{member}</option>
                                                ))}
                                            </select>
                                        </div>

                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                類別
                                            </label>
                                            <select
                                                name="category"
                                                required
                                                className="w-full px-4 py-2 border border-gray-300 rounded-lg"
                                            >
                                                <option value="">選擇類別</option>
                                                <option value="交通">交通</option>
                                                <option value="住宿">住宿</option>
                                                <option value="餐飲">餐飲</option>
                                                <option value="門票">門票</option>
                                                <option value="購物">購物</option>
                                                <option value="其他">其他</option>
                                            </select>
                                        </div>
                                    </div>

                                    <button
                                        type="submit"
                                        className="w-full mt-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold"
                                    >
                                        新增支出
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TravelApp />);
    </script>
</body>
</html>

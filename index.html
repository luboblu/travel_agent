<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅行規劃師 - 群組協作完整版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // ==================== 工具函數 ====================
        const safeLocalStorage = {
            getItem: (key, defaultValue = null) => {
                try {
                    const item = localStorage.getItem(key);
                    return item ? JSON.parse(item) : defaultValue;
                } catch (error) {
                    console.warn(`localStorage 讀取失敗 (${key}):`, error);
                    return defaultValue;
                }
            },
            setItem: (key, value) => {
                try {
                    localStorage.setItem(key, JSON.stringify(value));
                    return true;
                } catch (error) {
                    console.warn(`localStorage 儲存失敗 (${key}):`, error);
                    return false;
                }
            }
        };

        // ==================== Icon 組件 ====================
        const MapPin = ({ className = "w-5 h-5" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
            </svg>
        );

        const Calendar = ({ className = "w-5 h-5" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
        );

        const CheckSquare = ({ className = "w-5 h-5" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
            </svg>
        );

        const Package = ({ className = "w-5 h-5" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
            </svg>
        );

        const DollarSign = ({ className = "w-5 h-5" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        );

        const Users = ({ className = "w-5 h-5" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
        );

        const ArrowsUpDown = ({ className = "w-5 h-5" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" />
            </svg>
        );

        const Plus = ({ className = "w-5 h-5" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
            </svg>
        );

        const X = ({ className = "w-5 h-5" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
            </svg>
        );

        const Edit = ({ className = "w-5 h-5" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
            </svg>
        );

        const Trash = ({ className = "w-5 h-5" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
        );

        const LogOut = ({ className = "w-5 h-5" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
        );

        const Settings = ({ className = "w-5 h-5" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        );

        const UserPlus = ({ className = "w-5 h-5" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
            </svg>
        );

        const UserMinus = ({ className = "w-5 h-5" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7a4 4 0 11-8 0 4 4 0 018 0zM9 14a6 6 0 00-6 6v1h12v-1a6 6 0 00-6-6zM21 12h-6" />
            </svg>
        );

        const TrendingUp = ({ className = "w-5 h-5" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
            </svg>
        );

        const Clock = ({ className = "w-5 h-5" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        );

        // ==================== 登入/註冊頁面 ====================
        function LoginPage({ onLogin }) {
            const [isRegister, setIsRegister] = useState(false);
            const [error, setError] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const username = formData.get('username').trim();
                const password = formData.get('password');

                if (!username || !password) {
                    setError('請輸入用戶名和密碼');
                    return;
                }

                const users = safeLocalStorage.getItem('users', {});

                if (isRegister) {
                    if (users[username]) {
                        setError('用戶名已存在');
                        return;
                    }
                    
                    const isFirstUser = Object.keys(users).length === 0;
                    
                    users[username] = {
                        username,
                        password,
                        role: isFirstUser ? 'admin' : 'user',
                        groups: [],
                        createdAt: new Date().toISOString()
                    };
                    
                    safeLocalStorage.setItem('users', users);
                    alert(`註冊成功！${isFirstUser ? '你是第一個用戶，已自動設為管理員。' : ''}請登入。`);
                    setIsRegister(false);
                    setError('');
                } else {
                    if (!users[username] || users[username].password !== password) {
                        setError('用戶名或密碼錯誤');
                        return;
                    }
                    onLogin(users[username]);
                }
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
                        <div className="text-center mb-8">
                            <div className="text-4xl mb-2">✈️</div>
                            <h1 className="text-3xl font-bold text-gray-800">旅行規劃師</h1>
                            <p className="text-gray-600 mt-2">群組協作版</p>
                        </div>

                        {error && (
                            <div className="mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm">
                                {error}
                            </div>
                        )}

                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">
                                    用戶名
                                </label>
                                <input
                                    type="text"
                                    name="username"
                                    required
                                    className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                    placeholder="請輸入用戶名"
                                />
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">
                                    密碼
                                </label>
                                <input
                                    type="password"
                                    name="password"
                                    required
                                    className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                    placeholder="請輸入密碼"
                                />
                            </div>

                            <button
                                type="submit"
                                className="w-full py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold transition-colors"
                            >
                                {isRegister ? '註冊' : '登入'}
                            </button>
                        </form>

                        <div className="mt-6 text-center">
                            <button
                                onClick={() => {
                                    setIsRegister(!isRegister);
                                    setError('');
                                }}
                                className="text-blue-600 hover:text-blue-800 font-medium"
                            >
                                {isRegister ? '已有帳號？登入' : '沒有帳號？註冊'}
                            </button>
                        </div>

                        <div className="mt-8 pt-6 border-t border-gray-200">
                            <p className="text-xs text-gray-500 text-center">
                                💡 提示：第一個註冊的用戶將自動成為管理員
                            </p>
                        </div>
                    </div>
                </div>
            );
        }

        // ==================== 系統管理頁面 ====================
        function AdminPanel({ user, onBack }) {
            const [activeAdminTab, setActiveAdminTab] = useState('users');
            const [users, setUsers] = useState({});
            const [groups, setGroups] = useState({});
            const [showAddUserToGroup, setShowAddUserToGroup] = useState(null);
            const [showGroupMembers, setShowGroupMembers] = useState(null);

            useEffect(() => {
                loadData();
            }, []);

            const loadData = () => {
                const allUsers = safeLocalStorage.getItem('users', {});
                const allGroups = safeLocalStorage.getItem('groups', {});
                setUsers(allUsers);
                setGroups(allGroups);
            };

            const addUserToGroup = (username, groupId) => {
                const allGroups = safeLocalStorage.getItem('groups', {});

                if (!allGroups[groupId].members.includes(username)) {
                    allGroups[groupId].members.push(username);
                    
                    if (!allGroups[groupId].data.personalData[username]) {
                        allGroups[groupId].data.personalData[username] = {
                            packingItems: [],
                            expenses: []
                        };
                    }
                    
                    if (!allGroups[groupId].data.splitBillData.members.includes(username)) {
                        allGroups[groupId].data.splitBillData.members.push(username);
                    }

                    safeLocalStorage.setItem('groups', allGroups);
                    loadData();
                    alert(`已將 ${username} 加入群組！`);
                }
            };

            const removeUserFromGroup = (username, groupId) => {
                if (!confirm(`確定要將 ${username} 從群組移除嗎？`)) return;

                const allGroups = safeLocalStorage.getItem('groups', {});
                
                allGroups[groupId].members = allGroups[groupId].members.filter(m => m !== username);
                allGroups[groupId].data.splitBillData.members = allGroups[groupId].data.splitBillData.members.filter(m => m !== username);
                
                safeLocalStorage.setItem('groups', allGroups);
                loadData();
                alert(`已將 ${username} 從群組移除`);
            };

            const deleteGroup = (groupId, groupName) => {
                if (!confirm(`確定要刪除群組「${groupName}」嗎？此操作無法復原！`)) return;

                const allGroups = safeLocalStorage.getItem('groups', {});
                delete allGroups[groupId];
                safeLocalStorage.setItem('groups', allGroups);
                loadData();
                alert(`群組「${groupName}」已刪除`);
            };

            const clearAllData = () => {
                if (!confirm('⚠️ 警告：這將清除所有用戶和群組資料！確定要繼續嗎？')) return;
                if (!confirm('⚠️ 最後確認：真的要清除所有資料嗎？此操作無法復原！')) return;
                
                localStorage.clear();
                alert('所有資料已清除！頁面將重新載入。');
                window.location.reload();
            };

            const userList = Object.values(users);
            const groupList = Object.values(groups);

            return (
                <div className="min-h-screen bg-gray-100">
                    <div className="bg-white shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-bold text-gray-800">系統管理</h1>
                                <p className="text-sm text-gray-600 mt-1">管理員：{user.username}</p>
                            </div>
                            <button
                                onClick={onBack}
                                className="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition-colors"
                            >
                                ← 返回
                            </button>
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto p-6">
                        <div className="grid md:grid-cols-3 gap-4 mb-6">
                            <div className="bg-white rounded-xl shadow-md p-6">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-gray-600 text-sm">總用戶數</p>
                                        <p className="text-3xl font-bold text-blue-600">{userList.length}</p>
                                    </div>
                                    <Users className="w-12 h-12 text-blue-300" />
                                </div>
                            </div>
                            <div className="bg-white rounded-xl shadow-md p-6">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-gray-600 text-sm">總群組數</p>
                                        <p className="text-3xl font-bold text-purple-600">{groupList.length}</p>
                                    </div>
                                    <Settings className="w-12 h-12 text-purple-300" />
                                </div>
                            </div>
                            <div className="bg-white rounded-xl shadow-md p-6">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-gray-600 text-sm">管理員數</p>
                                        <p className="text-3xl font-bold text-green-600">
                                            {userList.filter(u => u.role === 'admin').length}
                                        </p>
                                    </div>
                                    <UserPlus className="w-12 h-12 text-green-300" />
                                </div>
                            </div>
                        </div>

                        <div className="bg-white rounded-xl shadow-md mb-6">
                            <div className="flex border-b border-gray-200">
                                <button
                                    onClick={() => setActiveAdminTab('users')}
                                    className={`flex-1 px-6 py-4 font-semibold transition-colors ${
                                        activeAdminTab === 'users'
                                            ? 'text-blue-600 border-b-2 border-blue-600'
                                            : 'text-gray-600 hover:text-gray-800'
                                    }`}
                                >
                                    👥 用戶管理
                                </button>
                                <button
                                    onClick={() => setActiveAdminTab('groups')}
                                    className={`flex-1 px-6 py-4 font-semibold transition-colors ${
                                        activeAdminTab === 'groups'
                                            ? 'text-purple-600 border-b-2 border-purple-600'
                                            : 'text-gray-600 hover:text-gray-800'
                                    }`}
                                >
                                    🏢 群組管理
                                </button>
                                <button
                                    onClick={() => setActiveAdminTab('tools')}
                                    className={`flex-1 px-6 py-4 font-semibold transition-colors ${
                                        activeAdminTab === 'tools'
                                            ? 'text-red-600 border-b-2 border-red-600'
                                            : 'text-gray-600 hover:text-gray-800'
                                    }`}
                                >
                                    🔧 開發工具
                                </button>
                            </div>
                        </div>

                        {activeAdminTab === 'users' && (
                            <div className="bg-white rounded-xl shadow-md p-6">
                                <h2 className="text-xl font-bold text-gray-800 mb-6">
                                    所有用戶 ({userList.length})
                                </h2>
                                {userList.length === 0 ? (
                                    <p className="text-gray-400 text-center py-8">還沒有用戶</p>
                                ) : (
                                    <div className="space-y-4">
                                        {userList.map(u => {
                                            const userGroups = groupList.filter(g => g.members.includes(u.username));
                                            return (
                                                <div key={u.username} className="border-2 border-gray-200 rounded-xl p-5 hover:border-blue-300 transition-colors">
                                                    <div className="flex items-start justify-between mb-3">
                                                        <div className="flex-1">
                                                            <div className="flex items-center gap-3 mb-2">
                                                                <div className="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold">
                                                                    {u.username[0].toUpperCase()}
                                                                </div>
                                                                <div>
                                                                    <h3 className="text-lg font-bold text-gray-800">
                                                                        {u.username}
                                                                        {u.role === 'admin' && (
                                                                            <span className="ml-2 px-2 py-1 bg-red-100 text-red-800 text-xs rounded">
                                                                                管理員
                                                                            </span>
                                                                        )}
                                                                    </h3>
                                                                    <p className="text-sm text-gray-600">
                                                                        註冊於 {new Date(u.createdAt).toLocaleDateString('zh-TW')}
                                                                    </p>
                                                                </div>
                                                            </div>
                                                            <div className="ml-13 mt-3">
                                                                <p className="text-sm text-gray-600 mb-2">
                                                                    <span className="font-semibold">所屬群組：</span>
                                                                    {userGroups.length === 0 ? (
                                                                        <span className="text-gray-400">尚未加入任何群組</span>
                                                                    ) : (
                                                                        <span>{userGroups.length} 個</span>
                                                                    )}
                                                                </p>
                                                                {userGroups.length > 0 && (
                                                                    <div className="flex flex-wrap gap-2 mt-2">
                                                                        {userGroups.map(g => (
                                                                            <span key={g.id} className="px-3 py-1 bg-blue-100 text-blue-800 rounded-full text-xs font-medium">
                                                                                {g.name}
                                                                            </span>
                                                                        ))}
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </div>
                                                        <button
                                                            onClick={() => setShowAddUserToGroup(u.username)}
                                                            className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors text-sm flex items-center gap-2"
                                                        >
                                                            <UserPlus className="w-4 h-4" />
                                                            加入群組
                                                        </button>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        )}

                        {activeAdminTab === 'groups' && (
                            <div className="bg-white rounded-xl shadow-md p-6">
                                <h2 className="text-xl font-bold text-gray-800 mb-6">
                                    所有群組 ({groupList.length})
                                </h2>
                                {groupList.length === 0 ? (
                                    <p className="text-gray-400 text-center py-8">還沒有群組</p>
                                ) : (
                                    <div className="space-y-4">
                                        {groupList.map(g => (
                                            <div key={g.id} className="border-2 border-gray-200 rounded-xl p-5 hover:border-purple-300 transition-colors">
                                                <div className="flex items-start justify-between mb-4">
                                                    <div className="flex-1">
                                                        <div className="flex items-center gap-3 mb-2">
                                                            <div className="text-3xl">✈️</div>
                                                            <div>
                                                                <h3 className="text-xl font-bold text-gray-800">{g.name}</h3>
                                                                <p className="text-sm text-gray-600">
                                                                    建立者: {g.createdBy} • {new Date(g.createdAt).toLocaleDateString('zh-TW')}
                                                                </p>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <button
                                                        onClick={() => deleteGroup(g.id, g.name)}
                                                        className="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors text-sm flex items-center gap-2"
                                                    >
                                                        <Trash className="w-4 h-4" />
                                                        刪除群組
                                                    </button>
                                                </div>
                                                <div className="bg-gray-50 rounded-lg p-4">
                                                    <div className="flex items-center justify-between mb-3">

            function PackingTab() {

                const handleAdd = (e) => {
                    e.preventDefault();
                    if (!newItem.trim()) return;

                    if (!newData.personalData[user.username]) {
                        newData.personalData[user.username] = { packingItems: [], expenses: [] };
                    }
                    newData.personalData[user.username].packingItems.push({
                        id: Date.now(),
                        item: newItem,
                        packed: false
                    });
                    saveGroupData(newData);
                    setNewItem('');
                };

                const handleToggle = (id) => {
                    const newData = { ...groupData };
                    const item = newData.personalData[user.username].packingItems.find(i => i.id === id);

                    saveGroupData(newData);
                };

                const handleDelete = (id) => {
                    const newData = { ...groupData };
                    newData.personalData[user.username].packingItems = 
                        newData.personalData[user.username].packingItems.filter(i => i.id !== id);
                    saveGroupData(newData);

                const packedItems = myData.packingItems.filter(i => i.packed);

        // ==================== Part 3 開始 ====================
            // 分帳系統 + 匯率換算 + 主程式

            // ==================== 分帳系統 Tab ====================
            function SplitBillTab() {
                const [showAddForm, setShowAddForm] = useState(false);
                const [editingIndex, setEditingIndex] = useState(null);
                const [editingItem, setEditingItem] = useState(null);
                const splitData = groupData.splitBillData;

                const handleAddExpense = (e) => {
                    e.preventDefault();
                    const formData = new FormData(e.target);
                    
                    const participants = [];
                    splitData.members.forEach(member => {
                        if (formData.get(`participant_${member}`) === 'on') {
                            participants.push(member);
                        }
                    });

                    if (participants.length === 0) {
                        alert('請至少選擇一位參與者');
                        return;
                    }

                    const newExpense = {
                        id: Date.now(),
                        item: formData.get('item'),
                        amount: parseFloat(formData.get('amount')),
                        payer: formData.get('payer'),
                        category: formData.get('category'),
                        participants: participants,
                        date: formData.get('date'),
                        addedBy: user.username,
                        addedAt: new Date().toISOString()
                    };

                    const newData = { ...groupData };
                    if (editingIndex !== null) {
                        newData.splitBillData.expenses[editingIndex] = newExpense;
                        setEditingIndex(null);
                        setEditingItem(null);
                    } else {
                        newData.splitBillData.expenses.push(newExpense);
                    }
                    saveGroupData(newData);
                    setShowAddForm(false);
                    e.target.reset();
                };

                const handleEdit = (index) => {
                    setEditingIndex(index);
                    setEditingItem(splitData.expenses[index]);
                    setShowAddForm(true);
                };

                const handleDelete = (index) => {
                    if (!confirm('確定要刪除這筆分帳記錄嗎？')) return;
                    const newData = { ...groupData };
                    newData.splitBillData.expenses.splice(index, 1);
                    saveGroupData(newData);
                };

                // 計算每個人的結算
                const calculateSettlement = () => {
                    const balances = {};
                    splitData.members.forEach(m => balances[m] = 0);

                    splitData.expenses.forEach(expense => {
                        const shareAmount = expense.amount / expense.participants.length;
                        balances[expense.payer] += expense.amount;
                        expense.participants.forEach(participant => {
                            balances[participant] -= shareAmount;
                        });
                    });

                    const settlements = [];
                    const creditors = Object.entries(balances).filter(([_, amt]) => amt > 0.01).sort((a, b) => b[1] - a[1]);
                    const debtors = Object.entries(balances).filter(([_, amt]) => amt < -0.01).sort((a, b) => a[1] - b[1]);

                    let i = 0, j = 0;
                    while (i < creditors.length && j < debtors.length) {
                        const [creditor, creditAmount] = creditors[i];
                        const [debtor, debtAmount] = debtors[j];
                        const amount = Math.min(creditAmount, -debtAmount);

                        settlements.push({
                            from: debtor,
                            to: creditor,
                            amount: amount
                        });

                        creditors[i][1] -= amount;
                        debtors[j][1] += amount;

                        if (creditors[i][1] < 0.01) i++;
                        if (debtors[j][1] > -0.01) j++;
                    }

                    return { balances, settlements };
                };

                const { balances, settlements } = calculateSettlement();
                const totalExpenses = splitData.expenses.reduce((sum, exp) => sum + exp.amount, 0);

                            </div>
                            <div className="bg-gradient-to-r from-blue-500 to-purple-500 rounded-xl shadow-lg p-6 text-white">
                                <p className="text-sm opacity-90 mb-2">群組成員</p>
                                <p className="text-4xl font-bold">{splitData.members.length} 位</p>
                            </div>
                        </div>

                        {showAddForm && (
                            <div className="bg-white rounded-xl shadow-md p-6 mb-6">
                                <h3 className="text-lg font-bold text-gray-800 mb-4">
                                    {editingIndex !== null ? '編輯分帳記錄' : '新增分帳記錄'}
                                </h3>
                                <form onSubmit={handleAddExpense} className="space-y-4">
                                    <div className="grid md:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                日期 *
                                            </label>
                                            <input
                                                type="date"
                                                name="date"
                                                required
                                                defaultValue={editingItem?.date || new Date().toISOString().split('T')[0]}
                                                className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                分類 *
                                            </label>
                                            <select
                                                name="category"
                                                required
                                                defaultValue={editingItem?.category || '餐飲'}
                                                className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500"
                                            >
                                                <option value="餐飲">餐飲</option>
                                                <option value="交通">交通</option>
                                                <option value="住宿">住宿</option>
                                                <option value="景點">景點</option>
                                                <option value="購物">購物</option>
                                                <option value="其他">其他</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            項目 *
                                        </label>
                                        <input
                                            type="text"
                                            name="item"
                                            required
                                            defaultValue={editingItem?.item}
                                            placeholder="例如：晚餐"
                                            className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500"
                                        />
                                    </div>
                                    <div className="grid md:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                金額 *
                                            </label>
                                            <input

                                                required

                                            >
                                                {splitData.members.map(member => (
                                                    <option key={member} value={member}>{member}</option>

                                            </select>
                                        </div>
                                    </div>
                                    <div>

                                        <div className="grid grid-cols-2 md:grid-cols-3 gap-3 p-4 bg-gray-50 rounded-lg max-h-48 overflow-y-auto">
                                            {splitData.members.map(member => (

                                                    <input
                                                        type="checkbox"
                                                        name={`participant_${member}`}

                                                        className="w-4 h-4 text-green-600 rounded"
                                                    />
                                                    <span className="text-sm text-gray-700">{member}</span>
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="flex gap-3">
                                        <button
                                            type="submit"
                                            className="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors"
                                        >
                                            {editingIndex !== null ? '更新' : '新增'}
                                        </button>
                                        <button
                                            type="button"
                                            onClick={() => {
                                                setShowAddForm(false);
                                                setEditingIndex(null);
                                                setEditingItem(null);
                                            }}
                                            className="px-6 py-2 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400 transition-colors"
                                        >
                                            取消
                                        </button>
                                    </div>
                                </form>
                            </div>
                        )}

                        {splitData.expenses.length > 0 && (
                            <div className="space-y-6">

                                    </div>

                                <div className="bg-white rounded-xl shadow-md p-6">

            // ==================== 匯率換算 Tab ====================
            function CurrencyTab() {
                const [fromCurrency, setFromCurrency] = useState('TWD');
                const [toCurrency, setToCurrency] = useState('JPY');
                const [fromAmount, setFromAmount] = useState('');
                const [toAmount, setToAmount] = useState('');
                const [rates, setRates] = useState(null);
                const [loading, setLoading] = useState(false);
                const [lastUpdate, setLastUpdate] = useState(null);

                const currencies = [
                    { code: 'TWD', name: '台幣', flag: '🇹🇼' },
                    { code: 'USD', name: '美元', flag: '🇺🇸' },
                    { code: 'JPY', name: '日圓', flag: '🇯🇵' },
                    { code: 'EUR', name: '歐元', flag: '🇪🇺' },
                    { code: 'GBP', name: '英鎊', flag: '🇬🇧' },
                    { code: 'KRW', name: '韓元', flag: '🇰🇷' },
                    { code: 'CNY', name: '人民幣', flag: '🇨🇳' },
                    { code: 'HKD', name: '港幣', flag: '🇭🇰' },
                    { code: 'SGD', name: '新加坡幣', flag: '🇸🇬' },
                    { code: 'AUD', name: '澳幣', flag: '🇦🇺' },
                    { code: 'CAD', name: '加幣', flag: '🇨🇦' },
                    { code: 'CHF', name: '瑞士法郎', flag: '🇨🇭' },
                    { code: 'THB', name: '泰銖', flag: '🇹🇭' },
                    { code: 'MYR', name: '馬來幣', flag: '🇲🇾' },
                    { code: 'PHP', name: '菲律賓披索', flag: '🇵🇭' },
                    { code: 'VND', name: '越南盾', flag: '🇻🇳' }
                ];

                const fallbackRates = {
                    TWD: 1, USD: 0.0312, JPY: 4.82, EUR: 0.0296, GBP: 0.0254,
                    KRW: 43.2, CNY: 0.226, HKD: 0.243, SGD: 0.0422, AUD: 0.0498,
                    CAD: 0.0447, CHF: 0.0282, THB: 1.12, MYR: 0.141, PHP: 1.82, VND: 794
                };

                useEffect(() => {
                    fetchRates();
                }, []);

                const fetchRates = async () => {
                    setLoading(true);
                    try {
                        const response = await fetch('https://api.exchangerate-api.com/v4/latest/TWD');
                        const data = await response.json();
                        setRates(data.rates);
                        setLastUpdate(new Date().toLocaleString('zh-TW'));
                    } catch (error) {
                        console.warn('匯率 API 失敗，使用離線匯率');
                        setRates(fallbackRates);
                        setLastUpdate('離線模式');
                    }
                    setLoading(false);
                };

                const convert = (amount, from, to) => {
                    if (!rates || !amount) return '';
                    const inTWD = from === 'TWD' ? amount : amount / rates[from];
                    const result = to === 'TWD' ? inTWD : inTWD * rates[to];
                    return result.toFixed(2);
                };

                const handleFromAmountChange = (value) => {
                    setFromAmount(value);
                    if (value && rates) {
                        setToAmount(convert(parseFloat(value), fromCurrency, toCurrency));
                    } else {
                        setToAmount('');
                    }
                };

                const handleToAmountChange = (value) => {
                    setToAmount(value);
                    if (value && rates) {
                        setFromAmount(convert(parseFloat(value), toCurrency, fromCurrency));
                    } else {
                        setFromAmount('');
                    }
                };

                const handleSwap = () => {
                    setFromCurrency(toCurrency);
                    setToCurrency(fromCurrency);
                    setFromAmount(toAmount);
                    setToAmount(fromAmount);
                };

                return (
                    <div>
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-2xl font-bold text-gray-800">匯率換算</h2>
                            <button
                                onClick={fetchRates}
                                disabled={loading}
                                className="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors disabled:bg-gray-400"
                            >
                                <TrendingUp className="w-5 h-5" />
                                {loading ? '更新中...' : '更新匯率'}
                            </button>
                        </div>

                        {lastUpdate && (
                            <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 mb-6 text-sm text-blue-800">

                                        >
                                            {currencies.map(c => (
                                                <option key={c.code} value={c.code}>
                                                    {c.flag} {c.code} - {c.name}
                                                </option>
                                            ))}
                                        </select>
                                        <input
                                            type="number"
                                            value={fromAmount}
                                            onChange={(e) => handleFromAmountChange(e.target.value)}
                                            placeholder="輸入金額"
                                            className="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                        />
                                    </div>
                                </div>

                                <div className="flex justify-center">
                                    <button
                                        onClick={handleSwap}
                                        className="p-3 bg-blue-100 hover:bg-blue-200 rounded-full transition-colors"
                                    >
                                        <ArrowsUpDown className="w-6 h-6 text-blue-600" />
                                    </button>
                                </div>

                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">到</label>
                                    <div className="flex gap-3">
                                        <select
                                            value={toCurrency}
                                            onChange={(e) => {
                                                setToCurrency(e.target.value);
                                                if (fromAmount) handleFromAmountChange(fromAmount);
                                            }}
                                            className="px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 bg-white"
                                        >
                                            {currencies.map(c => (
                                                <option key={c.code} value={c.code}>
                                                    {c.flag} {c.code} - {c.name}
                                                </option>
                                            ))}
                                        </select>
                                        <input
                                            type="number"
                                            value={toAmount}
                                            onChange={(e) => handleToAmountChange(e.target.value)}
                                            placeholder="換算結果"
                                            className="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                        />
                                    </div>
                                </div>
                            </div>

                            {rates && fromAmount && (
                                <div className="mt-6 p-4 bg-gradient-to-r from-blue-50 to-purple-50 rounded-lg">
                                    <p className="text-sm text-gray-700 text-center">
                                        1 {fromCurrency} = {(rates[toCurrency] / rates[fromCurrency]).toFixed(4)} {toCurrency}
                                    </p>
                                </div>
                            )}
                        </div>

                        <div className="bg-white rounded-xl shadow-md p-6">
                            <h3 className="text-lg font-bold text-gray-800 mb-4">快速參考（以 TWD 為基準）</h3>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                {currencies.filter(c => c.code !== 'TWD').map(c => (
                                    <div key={c.code} className="p-3 bg-gradient-to-br from-blue-50 to-purple-50 rounded-lg">
                                        <div className="text-2xl mb-1">{c.flag}</div>
                                        <p className="text-xs text-gray-600">{c.code}</p>
                                        <p className="text-sm font-bold text-gray-800">
                                            {rates ? rates[c.code].toFixed(4) : '---'}
                                        </p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );

                        <div className="max-w-7xl mx-auto px-4 py-4">
                            <div className="flex justify-between items-center mb-4">
                                <div>
                                    <h1 className="text-2xl font-bold text-gray-800">{group.name}</h1>
                                    <p className="text-sm text-gray-600">成員: {group.members.join(', ')}</p>
                                </div>
                                <button
                                    onClick={onBack}
                                    className="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition-colors"
                                >
                                    ← 返回群組列表
                                </button>
                            </div>

                            <div className="flex gap-2 overflow-x-auto pb-2">
                                <button
                                    onClick={() => setActiveTab('itinerary')}
                                    className={`flex items-center gap-2 px-4 py-2 rounded-lg whitespace-nowrap transition-colors ${
                                        activeTab === 'itinerary'
                                            ? 'bg-blue-600 text-white'
                                            : 'bg-gray-200 text-gray-700 hover:bg-gray-300'
                                    }`}
                                >
                                    <Calendar className="w-4 h-4" />
                                    行程規劃
                                </button>
                                <button
                                    onClick={() => setActiveTab('todo')}
                                    className={`flex items-center gap-2 px-4 py-2 rounded-lg whitespace-nowrap transition-colors ${
                                        activeTab === 'todo'
                                            ? 'bg-green-600 text-white'
                                            : 'bg-gray-200 text-gray-700 hover:bg-gray-300'
                                    }`}
                                >
                                    <CheckSquare className="w-4 h-4" />
                                    待辦清單
                                </button>
                                <button
                                    onClick={() => setActiveTab('packing')}
                                    className={`flex items-center gap-2 px-4 py-2 rounded-lg whitespace-nowrap transition-colors ${
                                        activeTab === 'packing'
                                            ? 'bg-purple-600 text-white'
                                            : 'bg-gray-200 text-gray-700 hover:bg-gray-300'
                                    }`}
                                >
                                    <Package className="w-4 h-4" />
                                    整理行李
                                </button>
                                <button
                                    onClick={() => setActiveTab('personal')}
                                    className={`flex items-center gap-2 px-4 py-2 rounded-lg whitespace-nowrap transition-colors ${
                                        activeTab === 'personal'
                                            ? 'bg-orange-600 text-white'
                                            : 'bg-gray-200 text-gray-700 hover:bg-gray-300'
                                    }`}
                                >
                                    <DollarSign className="w-4 h-4" />
                                    個人記帳
                                </button>
                                <button
                                    onClick={() => setActiveTab('split')}
                                    className={`flex items-center gap-2 px-4 py-2 rounded-lg whitespace-nowrap transition-colors ${
                                        activeTab === 'split'
                                            ? 'bg-green-600 text-white'
                                            : 'bg-gray-200 text-gray-700 hover:bg-gray-300'
                                    }`}
                                >
                                    <Users className="w-4 h-4" />
                                    群組分帳
                                </button>
                                <button
                                    onClick={() => setActiveTab('currency')}
                                    className={`flex items-center gap-2 px-4 py-2 rounded-lg whitespace-nowrap transition-colors ${
                                        activeTab === 'currency'
                                            ? 'bg-blue-600 text-white'
                                            : 'bg-gray-200 text-gray-700 hover:bg-gray-300'
                                    }`}
                                >
                                    <TrendingUp className="w-4 h-4" />
                                    匯率換算
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto px-4 py-6">
                        {activeTab === 'itinerary' && <ItineraryTab />}
                        {activeTab === 'todo' && <TodoTab />}
                        {activeTab === 'packing' && <PackingTab />}
                        {activeTab === 'personal' && <PersonalExpenseTab />}
                        {activeTab === 'split' && <SplitBillTab />}
                        {activeTab === 'currency' && <CurrencyTab />}
                    </div>
                </div>
            );
        }

        // ==================== 主應用程式 ====================
        function App() {
            const [user, setUser] = useState(null);
            const [currentGroup, setCurrentGroup] = useState(null);
            const [showAdmin, setShowAdmin] = useState(false);

            const handleLogin = (userData) => {
                setUser(userData);
            };

            const handleLogout = () => {
                setUser(null);
                setCurrentGroup(null);
                setShowAdmin(false);
            };

            const handleSelectGroup = (group) => {
                setCurrentGroup(group);
                setShowAdmin(false);
            };

            const handleBackToGroups = () => {
                setCurrentGroup(null);
                setShowAdmin(false);
            };

            const handleOpenAdmin = () => {
                setShowAdmin(true);
                setCurrentGroup(null);
            };

            const handleCloseAdmin = () => {
                setShowAdmin(false);
            };

            if (!user) {
                return <LoginPage onLogin={handleLogin} />;
            }

            if (showAdmin && user.role === 'admin') {
                return <AdminPanel user={user} onBack={handleCloseAdmin} />;
            }

            if (!currentGroup) {
                return (
                    <GroupSelectionPage 
                        user={user} 
                        onSelectGroup={handleSelectGroup}
                        onLogout={handleLogout}
                        onOpenAdmin={handleOpenAdmin}
                    />
                );
            }

            return (
                <GroupMainPage 
                    user={user}
                    group={currentGroup}
                    onBack={handleBackToGroups}
                />
            );
        }

        // ==================== 渲染應用程式 ====================
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Voyage · 共同旅程規劃</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: {
    fontFamily: { display: ['Fraunces','serif'], sans: ['"Noto Sans TC"','system-ui','sans-serif'] },
    colors: {
      ink: '#141b2e', slate2: '#3a4360', paper: '#f6f4ef', card: '#fffdf9',
      amber2: '#e0952a', teal2: '#1f6f6b', line: '#e6e1d6'
    }
  }}
}
</script>
<style>
  body { background:#f6f4ef; color:#141b2e; }
  .tabbtn.active { color:#141b2e; }
  .tabbtn.active span.dot { opacity:1; }
  ::-webkit-scrollbar { width:8px; height:8px; }
  ::-webkit-scrollbar-thumb { background:#d8d2c4; border-radius:8px; }
  input, textarea, select { outline:none; }
  input:focus, textarea:focus, select:focus { border-color:#e0952a; box-shadow:0 0 0 3px rgba(224,149,42,.15); }
</style>
<!-- React -->
<script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
<!-- Firebase v9 compat -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBxP6IzPLqdKEm-CMdSElzxeUJ_mf1PLXM",
    authDomain: "travel-8e1f8.firebaseapp.com",
    projectId: "travel-8e1f8",
    storageBucket: "travel-8e1f8.firebasestorage.app",
    messagingSenderId: "576238991877",
    appId: "1:576238991877:web:2da9944ab1ba69bed5ba6c",
    measurementId: "G-NJBL1GZ1GM"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const FV = firebase.firestore.FieldValue;
</script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

/* ------------------------------- helpers ------------------------------- */
const cx = (...a) => a.filter(Boolean).join(' ');
const genCode = () => Array.from({length:6},()=>'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'[Math.floor(Math.random()*32)]).join('');
const fmtTime = (ts) => {
  const d = ts?.toDate ? ts.toDate() : (ts ? new Date(ts) : new Date());
  return d.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
};
const authErr = (code) => ({
  'auth/invalid-email':'電子郵件格式不正確',
  'auth/user-not-found':'找不到這個帳號',
  'auth/wrong-password':'密碼錯誤',
  'auth/invalid-credential':'帳號或密碼錯誤',
  'auth/email-already-in-use':'這個電子郵件已被註冊',
  'auth/weak-password':'密碼至少需要 6 個字元',
}[code] || '發生錯誤，請稍後再試');

/* --------------------------------- icons -------------------------------- */
const I = {
  map:  <path d="M9 3 4 5v16l5-2 6 2 5-2V3l-5 2-6-2Z"/>,
  check:<path d="M4 12l5 5L20 6"/>,
  bag:  <path d="M6 8h12l-1 12H7L6 8Zm3 0V6a3 3 0 0 1 6 0v2"/>,
  split:<path d="M12 3v18M5 8h14M5 16h14"/>,
  chat: <path d="M4 5h16v11H9l-5 4V5Z"/>,
  coin: <path d="M12 3v18M8 7h6a2 2 0 0 1 0 4H9a2 2 0 0 0 0 4h7"/>,
  plus: <path d="M12 5v14M5 12h14"/>,
  trash:<path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13"/>,
  back: <path d="M15 5l-7 7 7 7"/>,
  logout:<path d="M15 4h4v16h-4M10 8l-4 4 4 4M6 12h9"/>,
  users:<path d="M17 20v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2M10 10a3 3 0 1 0 0-6 3 3 0 0 0 0 6M21 20v-2a4 4 0 0 0-3-3.8"/>,
  copy: <path d="M9 9h11v11H9zM4 4h11v3M4 4v11h3"/>,
  send: <path d="M4 12l16-8-6 16-3-6-7-2Z"/>,
};
const Icon = ({d, cls='w-5 h-5'}) => (
  <svg className={cls} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">{d}</svg>
);

/* ------------------------------ auth screen ----------------------------- */
function AuthScreen() {
  const [mode, setMode] = useState('login');
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [pw, setPw] = useState('');
  const [err, setErr] = useState('');
  const [busy, setBusy] = useState(false);

  const submit = async () => {
    setErr('');
    if (!email || !pw || (mode==='register' && !name.trim())) { setErr('請填寫所有欄位'); return; }
    setBusy(true);
    try {
      if (mode === 'register') {
        const { user } = await auth.createUserWithEmailAndPassword(email, pw);
        await user.updateProfile({ displayName: name.trim() });
        await db.collection('users').doc(user.uid).set({
          username: name.trim(), email, createdAt: FV.serverTimestamp()
        });
      } else {
        await auth.signInWithEmailAndPassword(email, pw);
      }
    } catch (e) { setErr(authErr(e.code)); }
    setBusy(false);
  };

  return (
    <div className="min-h-screen flex items-center justify-center px-5 py-10">
      <div className="w-full max-w-md">
        <div className="text-center mb-8">
          <div className="inline-flex items-center gap-2 text-teal2 mb-3">
            <Icon d={I.map} cls="w-7 h-7" />
            <span className="font-display text-3xl tracking-tight text-ink">Voyage</span>
          </div>
          <p className="text-slate2 text-sm">找旅伴一起，把下一趟旅程規劃好。</p>
        </div>

        <div className="bg-card border border-line rounded-2xl shadow-sm p-6">
          <div className="flex gap-1 p-1 bg-paper rounded-xl mb-6">
            {[['login','登入'],['register','建立帳號']].map(([m,l])=>(
              <button key={m} onClick={()=>{setMode(m);setErr('')}}
                className={cx('flex-1 py-2 rounded-lg text-sm font-medium transition',
                  mode===m ? 'bg-card text-ink shadow-sm' : 'text-slate2')}>{l}</button>
            ))}
          </div>

          {mode==='register' && (
            <Field label="顯示名稱" value={name} onChange={setName} placeholder="旅程裡大家叫你的名字" />
          )}
          <Field label="電子郵件" type="email" value={email} onChange={setEmail} placeholder="you@example.com" />
          <Field label="密碼" type="password" value={pw} onChange={setPw} placeholder="至少 6 個字元"
                 onEnter={submit} />

          {err && <p className="text-sm text-red-600 mt-1 mb-2">{err}</p>}

          <button onClick={submit} disabled={busy}
            className="w-full mt-3 bg-ink text-paper py-3 rounded-xl font-medium hover:bg-slate2 transition disabled:opacity-50">
            {busy ? '處理中…' : (mode==='login' ? '登入' : '建立帳號並登入')}
          </button>
        </div>
        <p className="text-center text-xs text-slate2/70 mt-5">帳號由 Firebase Authentication 保管，密碼不會存進資料庫。</p>
      </div>
    </div>
  );
}

const Field = ({label,type='text',value,onChange,placeholder,onEnter}) => (
  <label className="block mb-4">
    <span className="text-xs font-medium text-slate2">{label}</span>
    <input type={type} value={value} placeholder={placeholder}
      onChange={e=>onChange(e.target.value)}
      onKeyDown={e=>{ if(e.key==='Enter'&&onEnter) onEnter(); }}
      className="mt-1 w-full border border-line rounded-xl px-3 py-2.5 bg-card text-sm" />
  </label>
);

/* ---------------------------- groups screen ----------------------------- */
function GroupsScreen({ user }) {
  const [groups, setGroups] = useState(null);
  const [active, setActive] = useState(null);
  const [name, setName] = useState('');
  const [code, setCode] = useState('');
  const [msg, setMsg] = useState('');

  useEffect(() => {
    const unsub = db.collection('groups')
      .where('members','array-contains',user.uid)
      .onSnapshot(s => setGroups(s.docs.map(d=>({id:d.id,...d.data()}))),
                  e => { console.error(e); setGroups([]); });
    return unsub;
  }, [user.uid]);

  const create = async () => {
    if (!name.trim()) return;
    const code = genCode();
    const ref = await db.collection('groups').add({
      name: name.trim(), code, ownerId: user.uid,
      members: [user.uid], memberNames: { [user.uid]: user.displayName },
      data: { itinerary: [], todos: [], packing: [], expenses: [] },
      createdAt: FV.serverTimestamp()
    });
    await db.collection('codes').doc(code).set({ gid: ref.id, name: name.trim() });
    setName('');
  };

  const join = async () => {
    setMsg('');
    const c = code.trim().toUpperCase();
    if (!c) return;
    try {
      const cd = await db.collection('codes').doc(c).get();
      if (!cd.exists) { setMsg('找不到這個邀請碼'); return; }
      const gid = cd.data().gid;
      await db.collection('groups').doc(gid).set({
        members: FV.arrayUnion(user.uid),
        memberNames: { [user.uid]: user.displayName }
      }, { merge: true });
      setCode('');
    } catch (e) { console.error(e); setMsg('加入失敗，請確認邀請碼'); }
  };

  if (active) return <GroupRoom user={user} groupId={active} onBack={()=>setActive(null)} />;

  return (
    <div className="min-h-screen">
      <header className="border-b border-line bg-card/70 backdrop-blur sticky top-0 z-10">
        <div className="max-w-3xl mx-auto px-5 h-16 flex items-center justify-between">
          <div className="flex items-center gap-2 text-teal2">
            <Icon d={I.map} cls="w-6 h-6" />
            <span className="font-display text-2xl text-ink">Voyage</span>
          </div>
          <div className="flex items-center gap-3">
            <span className="text-sm text-slate2 hidden sm:block">{user.displayName}</span>
            <button onClick={()=>auth.signOut()} className="text-slate2 hover:text-ink flex items-center gap-1 text-sm">
              <Icon d={I.logout} cls="w-4 h-4" />登出
            </button>
          </div>
        </div>
      </header>

      <main className="max-w-3xl mx-auto px-5 py-8">
        <h1 className="font-display text-3xl mb-1">你的旅程</h1>
        <p className="text-slate2 text-sm mb-7">開一趟新旅程，或用邀請碼加入朋友的規劃。</p>

        <div className="grid sm:grid-cols-2 gap-3 mb-8">
          <div className="bg-card border border-line rounded-2xl p-4">
            <p className="text-sm font-medium mb-2">開新旅程</p>
            <div className="flex gap-2">
              <input value={name} onChange={e=>setName(e.target.value)} placeholder="例如：京都五日"
                onKeyDown={e=>e.key==='Enter'&&create()}
                className="flex-1 border border-line rounded-xl px-3 py-2 text-sm" />
              <button onClick={create} className="bg-amber2 text-white px-3 rounded-xl flex items-center"><Icon d={I.plus} cls="w-5 h-5"/></button>
            </div>
          </div>
          <div className="bg-card border border-line rounded-2xl p-4">
            <p className="text-sm font-medium mb-2">用邀請碼加入</p>
            <div className="flex gap-2">
              <input value={code} onChange={e=>setCode(e.target.value.toUpperCase())} placeholder="6 碼邀請碼"
                onKeyDown={e=>e.key==='Enter'&&join()} maxLength={6}
                className="flex-1 border border-line rounded-xl px-3 py-2 text-sm tracking-widest uppercase" />
              <button onClick={join} className="bg-teal2 text-white px-3 rounded-xl flex items-center"><Icon d={I.users} cls="w-5 h-5"/></button>
            </div>
            {msg && <p className="text-xs text-red-600 mt-2">{msg}</p>}
          </div>
        </div>

        {groups === null ? (
          <p className="text-slate2 text-sm">載入中…</p>
        ) : groups.length === 0 ? (
          <div className="text-center py-16 border border-dashed border-line rounded-2xl">
            <Icon d={I.map} cls="w-10 h-10 mx-auto text-line" />
            <p className="text-slate2 text-sm mt-3">還沒有旅程。開一趟新的吧。</p>
          </div>
        ) : (
          <div className="grid gap-3">
            {groups.map(g=>(
              <button key={g.id} onClick={()=>setActive(g.id)}
                className="text-left bg-card border border-line rounded-2xl p-5 hover:border-amber2 hover:shadow-sm transition group">
                <div className="flex items-center justify-between">
                  <h3 className="font-display text-xl">{g.name}</h3>
                  <span className="text-xs text-slate2 flex items-center gap-1">
                    <Icon d={I.users} cls="w-4 h-4" />{g.members.length}
                  </span>
                </div>
                <p className="text-xs text-slate2 mt-1">邀請碼 <span className="font-mono tracking-widest text-slate2">{g.code}</span></p>
              </button>
            ))}
          </div>
        )}
      </main>
    </div>
  );
}

/* ------------------------------ group room ------------------------------ */
const TABS = [
  ['itinerary','行程',I.map],['todos','待辦',I.check],['packing','行李',I.bag],
  ['split','分帳',I.split],['chat','聊天',I.chat],['currency','匯率',I.coin],
];

function GroupRoom({ user, groupId, onBack }) {
  const [group, setGroup] = useState(null);
  const [tab, setTab] = useState('itinerary');
  const [gone, setGone] = useState(false);

  useEffect(() => {
    const unsub = db.collection('groups').doc(groupId).onSnapshot(
      d => { if (!d.exists) { setGone(true); return; } setGroup({ id:d.id, ...d.data() }); },
      e => { console.error(e); setGone(true); }
    );
    return unsub;
  }, [groupId]);

  const patchData = (partial) =>
    db.collection('groups').doc(groupId).set({ data: partial }, { merge: true });

  if (gone) return (
    <div className="min-h-screen flex flex-col items-center justify-center gap-3 text-slate2">
      <p>這趟旅程已無法開啟。</p>
      <button onClick={onBack} className="text-ink underline">回到列表</button>
    </div>
  );
  if (!group) return <div className="min-h-screen flex items-center justify-center text-slate2">載入中…</div>;

  const data = group.data || {};
  const members = group.memberNames || {};

  return (
    <div className="min-h-screen flex flex-col">
      <header className="border-b border-line bg-card/80 backdrop-blur sticky top-0 z-10">
        <div className="max-w-3xl mx-auto px-4 h-16 flex items-center gap-3">
          <button onClick={onBack} className="text-slate2 hover:text-ink"><Icon d={I.back} cls="w-5 h-5"/></button>
          <div className="min-w-0">
            <h1 className="font-display text-xl truncate">{group.name}</h1>
            <p className="text-xs text-slate2">{Object.values(members).join('、')}</p>
          </div>
          <div className="ml-auto"><InviteChip code={group.code} /></div>
        </div>
        <div className="max-w-3xl mx-auto px-2 flex overflow-x-auto">
          {TABS.map(([k,l,d])=>(
            <button key={k} onClick={()=>setTab(k)}
              className={cx('tabbtn shrink-0 px-3.5 py-2.5 text-sm flex items-center gap-1.5 border-b-2 transition',
                tab===k ? 'border-amber2 text-ink font-medium' : 'border-transparent text-slate2')}>
              <Icon d={d} cls="w-4 h-4" />{l}
            </button>
          ))}
        </div>
      </header>

      <main className="flex-1 max-w-3xl w-full mx-auto px-4 py-5">
        {tab==='itinerary' && <Itinerary data={data.itinerary||[]} save={v=>patchData({itinerary:v})} />}
        {tab==='todos'     && <Checklist kind="todos"   items={data.todos||[]}   save={v=>patchData({todos:v})}   placeholder="要辦的事，例如：訂新幹線" />}
        {tab==='packing'   && <Checklist kind="packing" items={data.packing||[]} save={v=>patchData({packing:v})} placeholder="要帶的東西，例如：轉接頭" />}
        {tab==='split'     && <Split data={data.expenses||[]} members={members} me={user} save={v=>patchData({expenses:v})} />}
        {tab==='chat'      && <Chat groupId={groupId} me={user} />}
        {tab==='currency'  && <Currency />}
      </main>
    </div>
  );
}

function InviteChip({ code }) {
  const [copied, setCopied] = useState(false);
  const copy = async () => {
    try { await navigator.clipboard.writeText(code); setCopied(true); setTimeout(()=>setCopied(false),1500); } catch {}
  };
  return (
    <button onClick={copy} className="flex items-center gap-1.5 bg-paper border border-line rounded-full px-3 py-1.5 text-xs hover:border-amber2">
      <span className="text-slate2">邀請碼</span>
      <span className="font-mono tracking-widest">{code}</span>
      <Icon d={I.copy} cls="w-3.5 h-3.5 text-slate2" />
      {copied && <span className="text-teal2">已複製</span>}
    </button>
  );
}

/* ------------------------------- itinerary ------------------------------ */
function Itinerary({ data, save }) {
  const [form, setForm] = useState({ day:'Day 1', time:'', title:'', note:'' });
  const add = () => {
    if (!form.title.trim()) return;
    const item = { id: Date.now(), ...form, title: form.title.trim() };
    save([...data, item].sort(dayThenTime));
    setForm({ ...form, time:'', title:'', note:'' });
  };
  const del = (id) => save(data.filter(i=>i.id!==id));
  const days = [...new Set(data.map(i=>i.day))];

  return (
    <div>
      <div className="bg-card border border-line rounded-2xl p-4 mb-5 grid grid-cols-2 sm:grid-cols-4 gap-2">
        <input value={form.day} onChange={e=>setForm({...form,day:e.target.value})} placeholder="Day 1"
          className="border border-line rounded-lg px-2.5 py-2 text-sm" />
        <input value={form.time} onChange={e=>setForm({...form,time:e.target.value})} placeholder="09:00" type="time"
          className="border border-line rounded-lg px-2.5 py-2 text-sm" />
        <input value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="要去哪、做什麼"
          onKeyDown={e=>e.key==='Enter'&&add()}
          className="col-span-2 sm:col-span-1 border border-line rounded-lg px-2.5 py-2 text-sm" />
        <button onClick={add} className="col-span-2 sm:col-span-1 bg-ink text-paper rounded-lg py-2 text-sm flex items-center justify-center gap-1">
          <Icon d={I.plus} cls="w-4 h-4"/>加入行程
        </button>
      </div>

      {data.length===0 ? <Empty text="還沒排定行程。加入第一個景點吧。" /> : days.map(day=>(
        <div key={day} className="mb-6">
          <h3 className="font-display text-lg mb-2 flex items-center gap-2">
            <span className="w-1.5 h-1.5 rounded-full bg-amber2" />{day}
          </h3>
          <div className="border-l-2 border-line ml-[3px] pl-4 space-y-2">
            {data.filter(i=>i.day===day).map(i=>(
              <div key={i.id} className="bg-card border border-line rounded-xl px-4 py-3 flex items-start gap-3 group">
                <span className="font-mono text-xs text-teal2 pt-0.5 w-11 shrink-0">{i.time||'—'}</span>
                <div className="flex-1 min-w-0">
                  <p className="text-sm font-medium">{i.title}</p>
                  {i.note && <p className="text-xs text-slate2 mt-0.5">{i.note}</p>}
                </div>
                <button onClick={()=>del(i.id)} className="text-line group-hover:text-red-400"><Icon d={I.trash} cls="w-4 h-4"/></button>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}
const dayThenTime = (a,b)=> (a.day+a.time).localeCompare(b.day+b.time);

/* ---------------------------- todos / packing --------------------------- */
function Checklist({ items, save, placeholder }) {
  const [text, setText] = useState('');
  const add = () => { if(!text.trim()) return; save([...items,{id:Date.now(),text:text.trim(),done:false}]); setText(''); };
  const toggle = (id)=> save(items.map(i=>i.id===id?{...i,done:!i.done}:i));
  const del = (id)=> save(items.filter(i=>i.id!==id));
  const left = items.filter(i=>!i.done).length;

  return (
    <div>
      <div className="flex gap-2 mb-4">
        <input value={text} onChange={e=>setText(e.target.value)} placeholder={placeholder}
          onKeyDown={e=>e.key==='Enter'&&add()}
          className="flex-1 border border-line rounded-xl px-3 py-2.5 text-sm bg-card" />
        <button onClick={add} className="bg-ink text-paper px-4 rounded-xl flex items-center"><Icon d={I.plus} cls="w-5 h-5"/></button>
      </div>
      {items.length>0 && <p className="text-xs text-slate2 mb-3">還有 {left} 項未完成</p>}
      {items.length===0 ? <Empty text="清單是空的。" /> : (
        <div className="space-y-2">
          {items.map(i=>(
            <div key={i.id} className="bg-card border border-line rounded-xl px-4 py-3 flex items-center gap-3 group">
              <button onClick={()=>toggle(i.id)}
                className={cx('w-5 h-5 rounded-md border flex items-center justify-center shrink-0',
                  i.done ? 'bg-teal2 border-teal2 text-white' : 'border-line')}>
                {i.done && <Icon d={I.check} cls="w-3.5 h-3.5" />}
              </button>
              <span className={cx('flex-1 text-sm', i.done && 'line-through text-slate2')}>{i.text}</span>
              <button onClick={()=>del(i.id)} className="text-line group-hover:text-red-400"><Icon d={I.trash} cls="w-4 h-4"/></button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* -------------------------------- split -------------------------------- */
function Split({ data, members, me, save }) {
  const names = Object.values(members);
  const [form, setForm] = useState({ title:'', amount:'', payer: me.displayName });
  const add = () => {
    const amt = parseFloat(form.amount);
    if (!form.title.trim() || !amt) return;
    save([...data, { id:Date.now(), title:form.title.trim(), amount:amt, payer:form.payer, at:new Date().toISOString() }]);
    setForm({ ...form, title:'', amount:'' });
  };
  const del = (id)=> save(data.filter(e=>e.id!==id));

  const settle = useMemo(()=>{
    const bal = {}; names.forEach(n=>bal[n]=0);
    const per = data.reduce((s,e)=>s+e.amount,0) / Math.max(names.length,1);
    data.forEach(e=>{ if(bal[e.payer]!=null) bal[e.payer]+=e.amount; });
    names.forEach(n=> bal[n] = +(bal[n]-per).toFixed(0));
    return { bal, total: data.reduce((s,e)=>s+e.amount,0), per: Math.round(per) };
  }, [data, names.join()]);

  return (
    <div>
      <div className="bg-card border border-line rounded-2xl p-4 mb-5 grid grid-cols-2 gap-2">
        <input value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="項目，例如：晚餐"
          className="col-span-2 border border-line rounded-lg px-2.5 py-2 text-sm" />
        <input value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})} placeholder="金額" type="number"
          className="border border-line rounded-lg px-2.5 py-2 text-sm" />
        <select value={form.payer} onChange={e=>setForm({...form,payer:e.target.value})}
          className="border border-line rounded-lg px-2.5 py-2 text-sm bg-card">
          {names.map(n=><option key={n}>{n}</option>)}
        </select>
        <button onClick={add} className="col-span-2 bg-ink text-paper rounded-lg py-2 text-sm flex items-center justify-center gap-1">
          <Icon d={I.plus} cls="w-4 h-4"/>記一筆
        </button>
      </div>

      {data.length>0 && (
        <div className="bg-teal2/5 border border-teal2/20 rounded-2xl p-4 mb-5">
          <div className="flex justify-between text-sm mb-3">
            <span className="text-slate2">總支出 <b className="text-ink">${settle.total.toLocaleString()}</b></span>
            <span className="text-slate2">每人份 <b className="text-ink">${settle.per.toLocaleString()}</b></span>
          </div>
          <div className="space-y-1.5">
            {names.map(n=>{
              const v = settle.bal[n];
              return (
                <div key={n} className="flex justify-between text-sm">
                  <span>{n}</span>
                  <span className={v>0?'text-teal2':v<0?'text-red-500':'text-slate2'}>
                    {v>0?`應收回 $${v.toLocaleString()}`:v<0?`要付 $${Math.abs(v).toLocaleString()}`:'剛好'}
                  </span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {data.length===0 ? <Empty text="還沒有花費紀錄。" /> : (
        <div className="space-y-2">
          {data.slice().reverse().map(e=>(
            <div key={e.id} className="bg-card border border-line rounded-xl px-4 py-3 flex items-center gap-3 group">
              <div className="flex-1">
                <p className="text-sm font-medium">{e.title}</p>
                <p className="text-xs text-slate2">{e.payer} 付款</p>
              </div>
              <span className="text-sm font-mono">${e.amount.toLocaleString()}</span>
              <button onClick={()=>del(e.id)} className="text-line group-hover:text-red-400"><Icon d={I.trash} cls="w-4 h-4"/></button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* --------------------------------- chat --------------------------------- */
function Chat({ groupId, me }) {
  const [msgs, setMsgs] = useState([]);
  const [text, setText] = useState('');
  const endRef = useRef(null);

  useEffect(() => {
    const unsub = db.collection('groups').doc(groupId).collection('messages')
      .orderBy('createdAt','asc').limitToLast(200)
      .onSnapshot(s => setMsgs(s.docs.map(d=>({id:d.id,...d.data()}))));
    return unsub;
  }, [groupId]);

  useEffect(()=>{ endRef.current?.scrollIntoView({behavior:'smooth'}); }, [msgs]);

  const send = async () => {
    const t = text.trim(); if(!t) return;
    setText('');
    await db.collection('groups').doc(groupId).collection('messages').add({
      uid: me.uid, name: me.displayName, text: t, createdAt: FV.serverTimestamp()
    });
  };

  return (
    <div className="flex flex-col h-[calc(100vh-11rem)]">
      <div className="flex-1 overflow-y-auto space-y-3 pb-3">
        {msgs.length===0 && <Empty text="開始聊這趟旅程吧。" />}
        {msgs.map(m=>{
          const mine = m.uid===me.uid;
          return (
            <div key={m.id} className={cx('flex flex-col', mine?'items-end':'items-start')}>
              {!mine && <span className="text-xs text-slate2 mb-0.5 px-1">{m.name}</span>}
              <div className={cx('max-w-[78%] px-3.5 py-2 rounded-2xl text-sm',
                mine ? 'bg-ink text-paper rounded-br-sm' : 'bg-card border border-line rounded-bl-sm')}>
                {m.text}
              </div>
              <span className="text-[10px] text-slate2/60 mt-0.5 px-1">{fmtTime(m.createdAt)}</span>
            </div>
          );
        })}
        <div ref={endRef} />
      </div>
      <div className="flex gap-2 pt-2 border-t border-line">
        <input value={text} onChange={e=>setText(e.target.value)} placeholder="輸入訊息…"
          onKeyDown={e=>e.key==='Enter'&&send()}
          className="flex-1 border border-line rounded-full px-4 py-2.5 text-sm bg-card" />
        <button onClick={send} className="bg-amber2 text-white w-11 rounded-full flex items-center justify-center shrink-0">
          <Icon d={I.send} cls="w-5 h-5" />
        </button>
      </div>
    </div>
  );
}

/* ------------------------------- currency ------------------------------- */
const FALLBACK = { TWD:1, JPY:4.6, USD:0.031, EUR:0.029, KRW:42, CNY:0.22, HKD:0.24, THB:1.1, GBP:0.025 };
function Currency() {
  const [rates, setRates] = useState(null);
  const [note, setNote] = useState('');
  const [from, setFrom] = useState('TWD');
  const [to, setTo] = useState('JPY');
  const [amt, setAmt] = useState('1000');

  useEffect(() => {
    fetch('https://api.exchangerate-api.com/v4/latest/TWD')
      .then(r=>r.json())
      .then(d=>{ setRates(d.rates); setNote('更新於 '+new Date().toLocaleString('zh-TW')); })
      .catch(()=>{ setRates(FALLBACK); setNote('離線匯率（僅供參考）'); });
  }, []);

  const list = rates ? Object.keys(FALLBACK).filter(c=>rates[c]) : Object.keys(FALLBACK);
  const out = useMemo(()=>{
    const a = parseFloat(amt); if(!rates||!a) return '';
    const inTWD = from==='TWD'? a : a/rates[from];
    const res = to==='TWD'? inTWD : inTWD*rates[to];
    return res.toLocaleString('zh-TW',{maximumFractionDigits:2});
  }, [amt,from,to,rates]);

  return (
    <div className="max-w-md mx-auto">
      <div className="bg-card border border-line rounded-2xl p-5">
        <div className="grid grid-cols-2 gap-3 mb-4">
          <label className="block">
            <span className="text-xs text-slate2">從</span>
            <select value={from} onChange={e=>setFrom(e.target.value)} className="mt-1 w-full border border-line rounded-xl px-3 py-2.5 text-sm bg-card">
              {list.map(c=><option key={c}>{c}</option>)}
            </select>
          </label>
          <label className="block">
            <span className="text-xs text-slate2">到</span>
            <select value={to} onChange={e=>setTo(e.target.value)} className="mt-1 w-full border border-line rounded-xl px-3 py-2.5 text-sm bg-card">
              {list.map(c=><option key={c}>{c}</option>)}
            </select>
          </label>
        </div>
        <input value={amt} onChange={e=>setAmt(e.target.value)} type="number"
          className="w-full border border-line rounded-xl px-3 py-3 text-lg font-mono" />
        <div className="text-center py-5">
          <p className="font-display text-4xl text-ink">{out||'—'}</p>
          <p className="text-sm text-slate2 mt-1">{to}</p>
        </div>
        <p className="text-xs text-slate2/70 text-center">{note}</p>
      </div>
    </div>
  );
}

const Empty = ({text}) => (
  <div className="text-center py-14 text-slate2/70 text-sm">{text}</div>
);

/* --------------------------------- root --------------------------------- */
function App() {
  const [user, setUser] = useState(undefined);
  useEffect(() => auth.onAuthStateChanged(u => setUser(u)), []);

  if (user === undefined) return <div className="min-h-screen flex items-center justify-center text-slate2">載入中…</div>;
  return user ? <GroupsScreen user={user} /> : <AuthScreen />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

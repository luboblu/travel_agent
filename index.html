/* --------------------------- confirm-enter hook -------------------------- */
// 按一次 Enter 只是「預備」，1.2 秒內再按一次才真的送出（避免打字/選字誤觸）
function useConfirmEnter(action) {
  const [armed, setArmed] = useState(false);
  const timer = useRef(null);
  useEffect(() => () => clearTimeout(timer.current), []);
  const onKeyDown = (e) => {
    if (e.key !== 'Enter') return;
    if (armed) {
      clearTimeout(timer.current);
      setArmed(false);
      action();
    } else {
      setArmed(true);
      timer.current = setTimeout(() => setArmed(false), 1200);
    }
  };
  return { armed, onKeyDown };
}

/* --------------------------- google maps helpers ------------------------- */
// 從貼上的 Google 地圖連結或純文字地址，抽出可嵌入地圖的查詢字串
const mapEmbedQuery = (input) => {
  const s = (input || '').trim();
  if (!s) return '';
  let m = s.match(/@(-?\d{1,3}\.\d+),(-?\d{1,3}\.\d+)/) || s.match(/^(-?\d{1,3}\.\d+),\s*(-?\d{1,3}\.\d+)$/);
  if (m) return `${m[1]},${m[2]}`;
  m = s.match(/\/place\/([^\/@]+)/);
  if (m) { try { return decodeURIComponent(m[1].replace(/\+/g,' ')); } catch { return m[1].replace(/\+/g,' '); } }
  m = s.match(/[?&]q=([^&]+)/);
  if (m) { try { return decodeURIComponent(m[1].replace(/\+/g,' ')); } catch { return m[1].replace(/\+/g,' '); } }
  if (/^https?:\/\//.test(s)) return ''; // 短網址等無法解析座標，不強行嵌入
  return s; // 純文字地址/店名，直接當查詢字串
};
const mapEmbedSrc = (input) => {
  const q = mapEmbedQuery(input);
  return q ? `https://www.google.com/maps?q=${encodeURIComponent(q)}&output=embed` : '';
};
const mapExternalUrl = (input) => {
  const s = (input || '').trim();
  if (!s) return '#';
  return /^https?:\/\//.test(s) ? s : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s)}`;
};

/* ------------------------- Gemini（後端代理） ------------------------ */
// 金鑰在後端；這裡只把請求送到 /api/gemini，並帶上登入 token。
async function askGemini({ system, user, image, schema }) {
  const token = await auth.currentUser?.getIdToken();
  const res = await fetch('/api/gemini', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { Authorization: `Bearer ${token}` } : {})
    },
    body: JSON.stringify({ system, user, image, schema })
  });
  if (!res.ok) { const err = new Error('Gemini HTTP ' + res.status); err.status = res.status; throw err; }
  return await res.json();
}
// 只給使用者看得懂、且不洩漏內部細節的訊息；真正的錯誤用 console.error 留給開發者/後端 log
const fnErr = (e) =>
  e?.status === 429 ? 'AI 使用量暫時偏高，請過幾分鐘再試' :
  e?.status === 401 ? '請先登入再使用 AI 功能' :
  'AI 服務暫時無法使用，請稍後再試；若持續發生，請聯絡管理員';

/* ------------------------- Google 日曆（OAuth 串接） ------------------------ */
async function gcalFetch(path, opts = {}) {
  const token = await auth.currentUser?.getIdToken();
  const res = await fetch(path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: `Bearer ${token}` } : {}), ...(opts.headers||{}) }
  });
  if (!res.ok) { const err = new Error('gcal HTTP ' + res.status); err.status = res.status; throw err; }
  return await res.json();
}
const gcalStatus = () => gcalFetch('/api/google/status');

/* ------------------------- 匯率換算（以 TWD 為基準） ------------------------ */
const BASE_CCY = 'TWD';
const CCYS = ['TWD','JPY','USD','KRW','EUR','CNY','HKD','THB','SGD','GBP','AUD','VND','MYR','PHP','IDR'];
let _fxCache = null; // { at, rates }；rates[c] = 1 TWD 可換多少 c
async function fxRates() {
  const TTL = 12 * 3600 * 1000;
  if (_fxCache && Date.now() - _fxCache.at < TTL) return _fxCache.rates;
  try {
    const raw = localStorage.getItem('fxRates');
    if (raw) { const c = JSON.parse(raw); if (c?.rates && Date.now() - c.at < TTL) { _fxCache = c; return c.rates; } }
  } catch {}
  const res = await fetch(`https://open.er-api.com/v6/latest/${BASE_CCY}`);
  if (!res.ok) throw new Error('fx ' + res.status);
  const j = await res.json();
  if (j.result !== 'success' || !j.rates) throw new Error('fx-bad');
  _fxCache = { at: Date.now(), rates: j.rates };
  try { localStorage.setItem('fxRates', JSON.stringify(_fxCache)); } catch {}
  return j.rates;
}
// 把 amount(ccy) 換算成 TWD；抓不到匯率則 noRate=true、金額原樣帶回（不靜默混算）
async function toTWD(amount, ccy) {
  const c = String(ccy || BASE_CCY).toUpperCase();
  if (c === BASE_CCY) return { amountBase: amount, ccy: c, noRate: false };
  try {
    const rates = await fxRates();
    const r = rates[c];
    if (!r) return { amountBase: amount, ccy: c, noRate: true };
    return { amountBase: Math.round(amount / r), ccy: c, noRate: false };
  } catch {
    return { amountBase: amount, ccy: c, noRate: true };
  }
}
// 支出換算後的 TWD 金額（舊資料沒有 amountBase 就用 amount，視為已是 TWD）
const baseAmt = (e) => {
  const b = Number(e.amountBase);
  return Number.isFinite(b) ? b : (Number(e.amount) || 0);
};
const isForeign = (e) => String(e.ccy || BASE_CCY).toUpperCase() !== BASE_CCY;
// 顯示原幣金額，例如「1,200 JPY」或「NT$1,200」
const fmtOrig = (e) => {
  const n = (Number(e.amount) || 0).toLocaleString();
  return isForeign(e) ? `${n} ${String(e.ccy).toUpperCase()}` : `NT$${n}`;
};

/* ------------------------------ auth screen ----------------------------- */
function AuthScreen() {
  const [mode, setMode] = useState('login');
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [pw, setPw] = useState('');
  const [err, setErr] = useState('');
  const [msg, setMsg] = useState('');
  const [busy, setBusy] = useState(false);

  const resetPw = async () => {
    setErr(''); setMsg('');
    const em = email.trim().toLowerCase();
    if (!em) { setErr('請先輸入電子郵件，再點忘記密碼'); return; }
    setBusy(true);
    try {
      await auth.sendPasswordResetEmail(em);
      setMsg(`重設密碼的信已寄到 ${em}，請到信箱（含垃圾郵件）查看`);
    } catch (e) { console.error('reset error:', e.code, e.message); setErr(authErr(e.code)); }
    setBusy(false);
  };

  const submit = async () => {
    setMsg('');
    setErr('');
    // 手機鍵盤常自動大寫首字或多加空格，先正規化 email
    const em = email.trim().toLowerCase();
    if (!em || !pw || (mode==='register' && !name.trim())) { setErr('請填寫所有欄位'); return; }
    setBusy(true);
    try {
      if (mode === 'register') {
        const { user } = await auth.createUserWithEmailAndPassword(em, pw);
        await user.updateProfile({ displayName: name.trim() });
        await db.collection('users').doc(user.uid).set({
          username: name.trim(), email: em, createdAt: FV.serverTimestamp()
        });
      } else {
        await auth.signInWithEmailAndPassword(em, pw);
      }
    } catch (e) { console.error('auth error:', e.code, e.message); setErr(authErr(e.code)); }
    setBusy(false);
  };

  return (
    <div className="min-h-screen flex items-center justify-center px-5 py-10">
      <div className="w-full max-w-md">
        <div className="text-center mb-8">
          <div className="inline-flex items-center gap-2 text-teal2 mb-3">
            <Icon d={I.map} cls="w-7 h-7" />
            <span className="font-display text-3xl tracking-tight text-ink">Voyage</span>
          </div>
          <p className="text-slate2 text-sm">找旅伴一起，把下一趟旅程規劃好。</p>
        </div>

        <div className="bg-card border border-line rounded-2xl shadow-sm p-6">
          <div className="flex gap-1 p-1 bg-paper rounded-xl mb-6">
            {[['login','登入'],['register','建立帳號']].map(([m,l])=>(
              <button key={m} onClick={()=>{setMode(m);setErr('');setMsg('')}}
                className={cx('flex-1 py-2 rounded-lg text-sm font-medium transition',
                  mode===m ? 'bg-card text-ink shadow-sm' : 'text-slate2')}>{l}</button>
            ))}
          </div>

          {mode==='register' && (
            <Field label="顯示名稱" value={name} onChange={setName} placeholder="旅程裡大家叫你的名字" />
          )}
          <Field label="電子郵件" type="email" value={email} onChange={setEmail} placeholder="you@example.com" />
          <Field label="密碼" type="password" value={pw} onChange={setPw} placeholder="至少 6 個字元"
                 onEnter={submit} />

          {err && <p className="text-sm text-red-600 mt-1 mb-2">{err}</p>}
          {msg && <p className="text-sm text-teal2 mt-1 mb-2">{msg}</p>}

          {mode==='login' && (
            <div className="text-right -mt-1 mb-1">
              <button type="button" onClick={resetPw} disabled={busy}
                className="text-xs text-slate2 underline underline-offset-2 disabled:opacity-50">忘記密碼？</button>
            </div>
          )}

          <button onClick={submit} disabled={busy}
            className="w-full mt-3 bg-ink text-paper py-3 rounded-xl font-medium hover:bg-slate2 transition disabled:opacity-50">
            {busy ? '處理中…' : (mode==='login' ? '登入' : '建立帳號並登入')}
          </button>
        </div>
        <p className="text-center text-xs text-slate2/70 mt-5">帳號由 Firebase Authentication 保管，密碼不會存進資料庫。</p>
      </div>
    </div>
  );
}

const Field = ({label,type='text',value,onChange,placeholder,onEnter}) => {
  const isEmail = type === 'email';
  return (
  <label className="block mb-4">
    <span className="text-xs font-medium text-slate2">{label}</span>
    <input type={type} value={value} placeholder={placeholder}
      autoCapitalize={isEmail ? 'none' : undefined}
      autoCorrect={isEmail ? 'off' : undefined}
      spellCheck={isEmail ? false : undefined}
      inputMode={isEmail ? 'email' : undefined}
      autoComplete={type==='password' ? 'current-password' : (isEmail ? 'email' : undefined)}
      onChange={e=>onChange(e.target.value)}
      onKeyDown={e=>{ if(e.key==='Enter'&&onEnter) onEnter(); }}
      className="mt-1 w-full border border-line rounded-xl px-3 py-2.5 bg-card text-sm" />
  </label>
  );
};

/* ---------------------------- groups screen ----------------------------- */
function GroupsScreen({ user }) {
  const [groups, setGroups] = useState(null);
  const [active, setActive] = useState(null);
  const [name, setName] = useState('');
  const [code, setCode] = useState('');
  const [msg, setMsg] = useState('');
  const [isAdmin, setIsAdmin] = useState(false);
  const [showAdmin, setShowAdmin] = useState(false);

  useEffect(() => {
    const unsub = db.collection('groups')
      .where('members','array-contains',user.uid)
      .onSnapshot(s => setGroups(s.docs.map(d=>({id:d.id,...d.data()}))),
                  e => { console.error(e); setGroups([]); });
    return unsub;
  }, [user.uid]);

  useEffect(() => {
    const unsub = db.collection('users').doc(user.uid)
      .onSnapshot(d => setIsAdmin(d.data()?.role === 'admin'), () => setIsAdmin(false));
    return unsub;
  }, [user.uid]);

  const create = async () => {
    if (!name.trim()) return;
    const code = genCode();
    const ref = await db.collection('groups').add({
      name: name.trim(), code, ownerId: user.uid,
      members: [user.uid], memberNames: { [user.uid]: user.displayName },
      data: { itinerary: [], todos: [], packing: [], expenses: [] },
      createdAt: FV.serverTimestamp()
    });
    await db.collection('codes').doc(code).set({ gid: ref.id, name: name.trim() });
    setName('');
  };

  const join = async () => {
    setMsg('');
    const c = code.trim().toUpperCase();
    if (!c) return;
    try {
      const cd = await db.collection('codes').doc(c).get();
      if (!cd.exists) { setMsg('找不到這個邀請碼'); return; }
      const gid = cd.data().gid;
      await db.collection('groups').doc(gid).set({
        members: FV.arrayUnion(user.uid),
        memberNames: { [user.uid]: user.displayName }
      }, { merge: true });
      setCode('');
    } catch (e) { console.error(e); setMsg('加入失敗，請確認邀請碼'); }
  };

  const leave = async (g) => {
    if (!confirm(`確定要退出「${g.name}」嗎？退出後要重新輸入邀請碼才能再加入。`)) return;
    try {
      if ((g.members || []).length <= 1) {
        await db.collection('groups').doc(g.id).delete();
      } else {
        await db.collection('groups').doc(g.id).update({
          members: FV.arrayRemove(user.uid),
          [`memberNames.${user.uid}`]: FV.delete()
        });
      }
    } catch (e) { console.error(e); alert('退出失敗，請稍後再試'); }
  };

  const createEnter = useConfirmEnter(create);
  const joinEnter = useConfirmEnter(join);

  if (active) return <GroupRoom user={user} groupId={active} onBack={()=>setActive(null)} />;
  if (showAdmin) return <AdminPanel user={user} onBack={()=>setShowAdmin(false)} />;

  return (
    <div className="min-h-screen">
      <header className="border-b border-line bg-card/70 backdrop-blur sticky top-0 z-10">
        <div className="max-w-3xl mx-auto px-5 h-16 flex items-center justify-between">
          <div className="flex items-center gap-2 text-teal2">
            <Icon d={I.map} cls="w-6 h-6" />
            <span className="font-display text-2xl text-ink">Voyage</span>
          </div>
          <div className="flex items-center gap-3">
            <span className="text-sm text-slate2 hidden sm:block">{user.displayName}</span>
            {isAdmin && (
              <button onClick={()=>setShowAdmin(true)} className="text-slate2 hover:text-ink flex items-center gap-1 text-sm">
                <Icon d={I.shield} cls="w-4 h-4" />管理後台
              </button>
            )}
            <button onClick={()=>auth.signOut()} className="text-slate2 hover:text-ink flex items-center gap-1 text-sm">
              <Icon d={I.logout} cls="w-4 h-4" />登出
            </button>
          </div>
        </div>
      </header>

      <main className="max-w-3xl mx-auto px-5 py-8">
        <h1 className="font-display text-3xl mb-1">你的旅程</h1>
        <p className="text-slate2 text-sm mb-7">開一趟新旅程，或用邀請碼加入朋友的規劃。</p>

        <div className="grid sm:grid-cols-2 gap-3 mb-8">
          <div className="bg-card border border-line rounded-2xl p-4">

/* ------------------------------- itinerary ------------------------------ */
const todayISO = () => new Date().toISOString().slice(0,10);
const isIsoDate = (s) => /^\d{4}-\d{2}-\d{2}$/.test(s||'');
const pad2 = (n) => String(n).padStart(2, '0');
const isoFromParts = (y, m, d) => {
  const dt = new Date(Number(y), Number(m)-1, Number(d));
  return dt.getFullYear() === Number(y) && dt.getMonth() === Number(m)-1 && dt.getDate() === Number(d)
    ? `${dt.getFullYear()}-${pad2(dt.getMonth()+1)}-${pad2(dt.getDate())}`
    : '';
};
const addDays = (iso, days) => {
  const dt = new Date(iso+'T00:00:00');
  dt.setDate(dt.getDate() + days);
  return `${dt.getFullYear()}-${pad2(dt.getMonth()+1)}-${pad2(dt.getDate())}`;
};
const inferTripStartDate = (text) => {
  const s = text || '';
  let m = s.match(/(20\d{2})[\/\-.年]\s*(\d{1,2})[\/\-.月]\s*(\d{1,2})/);
  if (m) return isoFromParts(m[1], m[2], m[3]);
  m = s.match(/(?:^|[^\d])(\d{1,2})\s*月\s*(\d{1,2})\s*日?/);
  if (!m) m = s.match(/(?:^|[^\d])(\d{1,2})[\/\-.](\d{1,2})(?:$|[^\d])/);
  if (!m) return '';
  const now = new Date();
  let y = now.getFullYear();
  let iso = isoFromParts(y, m[1], m[2]);
  if (iso && iso < todayISO()) iso = isoFromParts(y + 1, m[1], m[2]);
  return iso;
};
const rawDayNumber = (day) => {
  const m = String(day || '').trim().match(/day\s*(\d+)/i) || String(day || '').trim().match(/第\s*(\d+)\s*天/);
  return m ? Number(m[1]) : 0;
};
const isRedesignIntent = (p) =>
  /重新(設計|規劃|安排|排)|重排|整個(重|換)|全部重(新|排)|從頭(排|規劃)?|重新來|redesign|start\s*over|replace\s*all/i.test(p || '');
const draftStartDate = (prompt, data, redesign) => {
  const explicit = inferTripStartDate(prompt);
  if (explicit) return explicit;
  const isoDays = [...new Set(data.map(i=>i.day))].filter(isIsoDate).sort();
  if (redesign && isoDays.length) return isoDays[0];
  const requestedDay = rawDayNumber(prompt);
  if (requestedDay && isoDays.length) return isoDays[0];
  if (isoDays.length) return addDays(isoDays[isoDays.length - 1], 1);
  if (requestedDay) return todayISO();
  const maxRawDay = Math.max(0, ...data.map(i=>rawDayNumber(i.day)));
  return addDays(todayISO(), maxRawDay);
};
const normalizeAiDay = (day, startIso) => {
  const raw = String(day || '').trim();
  if (isIsoDate(raw)) return raw;
  let m = raw.match(/day\s*(\d+)/i) || raw.match(/第\s*(\d+)\s*天/);
  if (m) {
    const n = Number(m[1]);
    return addDays(startIso, n - 1);
  }
  m = raw.match(/(?:^|[^\d])(\d{1,2})[\/\-.月]\s*(\d{1,2})/);
  if (m) return isoFromParts(startIso.slice(0,4), m[1], m[2]) || startIso;
  return startIso;
};
const normalizeLegacyDays = (items, anchorIso) =>
  items.map(i => {
    if (isIsoDate(i.day)) return i;
    const n = rawDayNumber(i.day);
    return n ? { ...i, day: addDays(anchorIso, n - 1) } : i;
  });
const fmtDayDate = (iso) => {
  const d = new Date(iso+'T00:00:00');
  return isNaN(d.getTime()) ? '' : d.toLocaleDateString('zh-TW', { month:'numeric', day:'numeric', weekday:'short' });
};

function Itinerary({ data, save, user }) {
  const [form, setForm] = useState({ day: todayISO(), time:'', title:'', note:'', map:'' });
  const [aiPrompt, setAiPrompt] = useState('');
  const [aiBusy, setAiBusy] = useState(false);
  const [aiErr, setAiErr] = useState('');
  const [aiDraft, setAiDraft] = useState(null);
  const [detail, setDetail] = useState(null);
  const [gcal, setGcal] = useState({ connected: false, email: null });
  const [gcalMsg, setGcalMsg] = useState('');
  const [gcalBusy, setGcalBusy] = useState(false);
  const [syncingId, setSyncingId] = useState(null);

  const refreshGcalStatus = async () => {
    try { setGcal(await gcalStatus()); } catch (e) { console.error(e); }
  };
  useEffect(() => { if (user) refreshGcalStatus(); }, [user]);
  useEffect(() => {
    const onMsg = (e) => {
      if (e.origin !== window.location.origin) return;
      if (e.data?.type === 'gcal-connected') { setGcalMsg('已連結 Google 日曆'); refreshGcalStatus(); }
      else if (e.data?.type === 'gcal-error') { setGcalMsg('連結失敗，請再試一次'); }
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const gcalConnect = async () => {
    setGcalMsg('');
    const popup = window.open('', 'gcal_oauth', 'width=480,height=640');
    try {
      const { url } = await gcalConnectUrl();
      if (popup) popup.location = url; else window.open(url, '_blank');
    } catch (e) {
      console.error(e);
      if (popup) popup.close();
      setGcalMsg('無法開始連結，請稍後再試');
    }
  };
  const gcalDoDisconnect = async () => {
    setGcalBusy(true);
    try { await gcalDisconnect(); setGcal({ connected:false, email:null }); setGcalMsg('已取消連結'); }
    catch (e) { console.error(e); setGcalMsg('取消連結失敗，請稍後再試'); }
    setGcalBusy(false);
  };
  const gcalSyncOne = async (item) => {
    setSyncingId(item.id);
    try {
      const { results } = await gcalSyncItems([{
        id: item.id, day: item.day, time: item.time||'', title: item.title||'', note: item.note||'', map: item.map||'', gcalEventId: item.gcalEventId||''
      }]);
      const hit = results?.[0];
      if (hit?.gcalEventId) save(data.map(x=>x.id===item.id?{...x, gcalEventId:hit.gcalEventId}:x));
      else setGcalMsg('加入 Google 日曆失敗，請稍後再試');
    } catch (e) { console.error(e); setGcalMsg('加入 Google 日曆失敗，請稍後再試'); }
    setSyncingId(null);
  };
  const gcalSyncAll = async () => {
    const existingIso = [...new Set(data.map(i=>i.day))].filter(isIsoDate).sort();
    const anchorIso = existingIso[0] || todayISO();
    const normalized = normalizeLegacyDays(data, anchorIso).filter(i=>isIsoDate(i.day) && i.title);
    if (!normalized.length) return;
    setGcalBusy(true);
    try {
      const { results } = await gcalSyncItems(normalized.map(i=>(
        { id:i.id, day:i.day, time:i.time||'', title:i.title||'', note:i.note||'', map:i.map||'', gcalEventId:i.gcalEventId||'' }
      )));
      const byId = Object.fromEntries((results||[]).filter(r=>r.gcalEventId).map(r=>[r.id, r.gcalEventId]));
      save(data.map(x => byId[x.id] ? { ...x, gcalEventId: byId[x.id] } : x));
      setGcalMsg(`已同步 ${Object.keys(byId).length}/${normalized.length} 個行程到 Google 日曆`);
    } catch (e) { console.error(e); setGcalMsg('同步失敗，請稍後再試'); }
    setGcalBusy(false);
  };

  const aiGen = async () => {
    const p = aiPrompt.trim(); if (!p || aiBusy) return;
    setAiBusy(true); setAiErr('');
    try {
      const redesign = isRedesignIntent(p);
      const startIso = draftStartDate(p, data, redesign);
      // 把目前完整行程餵給 AI，讓它避開重複內容並產生可挑選的草稿
      const currentList = data.map(i => ({
        day: i.day, time: i.time||'', title: i.title||'', note: i.note||'', place: i.map||''
      }));
      const out = await askGemini({
        system: '你是旅遊行程規劃助理，負責產生「可加入正式行程的草稿」。' +
          '你會收到「目前行程」(JSON 陣列)、「草稿起始日期」與「使用者指令」。請理解使用者的語意意圖，' +
          '只回傳這次建議新增或替換的草稿項目，不要回傳目前已存在且沒有變動的項目。\n' +
          '意圖判斷（依使用者用字彈性判斷，不限這些例子）：\n' +
          '- 「接著/後面/繼續/再加幾天…」→ 新草稿從草稿起始日期開始，不要重複目前已有內容。\n' +
          '- 「在某天加一個…」→ 只回傳要新增的項目。\n' +
          '- 「把第N天的X改成Y」→ 回傳建議替換的新項目，summary 說明使用者需自行刪除或編輯舊項目。\n' +
          '- 「刪掉/拿掉/不要…」→ 不要回傳舊項目，summary 說明可手動刪除。\n' +
          '- 「重新設計/重新規劃/重排/全部重新來」→ 使用者要整個行程重新設計，草稿起始日期已經是原行程第一天，' +
          '請針對從草稿起始日期到原行程最後一天的「每一天」都重新產生完整當天行程(不是只給差異或新增項目)，' +
          '這些天回傳的項目會直接取代該天原本的所有項目。\n' +
          '- 目前行程是空的 → 依指令產生新草稿。\n' +
          '日期規則：若使用者有指定明確日期，day 用該西元日期 YYYY-MM-DD；若沒有指定日期，' +
          '草稿第一天就是草稿起始日期，第二天是隔天，以此類推。你可以回傳 YYYY-MM-DD，也可以回傳 Day 1/Day 2，前端會轉成真實日期。' +
          'time 用 24 小時制 HH:MM；title 為地點或活動名稱(15 字內)；' +
          'note 放交通方式、預估花費或小提醒(可為空字串)；' +
          'place 是這個地點在 Google 地圖查得到的名稱，附上城市/地區避免同名(例如「北野異人館, 神戶」)，' +
          '填地名文字、不要網址或座標，無明確地點留空字串。' +
          '【重要】產生草稿後，請檢視草稿本身與目前行程的合理性：\n' +
          '(1) 同一天不要有時間衝突或重疊，不要兩個項目排在同一個時間；\n' +
          '(2) 相鄰行程之間要留足夠的交通與移動時間；跨城市移動(例如大阪→神戶)要安排交通並抓合理耗時，' +
          '也要注意與前一天/後一天銜接是否順(例如前一天最後在某城市，新的一天要從那裡出發或先移動)；\n' +
          '(3) 用餐安排要落在正常餐時，整天節奏不要過擠或過鬆；\n' +
          '(4) 依地理位置順路排列，避免來回繞路；\n' +
          '為了解決上述衝突，你可以微調受影響項目的時間或順序(即使不是使用者直接指定的項目)，' +
          '並在 summary 一併說明你順手調整了什麼。\n' +
          'summary 用一句話說明你做了什麼變更(含為了合理化而做的時間/順序調整)。',
        user: `目前行程(JSON)：\n${JSON.stringify(currentList)}\n\n草稿起始日期：${startIso}\n\n是否為整個重新設計：${redesign ? '是，請從草稿起始日期起，重新產生涵蓋原行程每一天的完整行程' : '否'}\n\n使用者指令：\n${p}`,
        schema: { type: 'OBJECT', required: ['items'], properties: {
          summary: { type:'STRING', description:'一句話說明這次做了什麼變更' },
          items: {
            type: 'ARRAY', items: { type: 'OBJECT',
              required: ['day', 'time', 'title', 'note', 'place'],
              properties: {
                day: { type:'STRING', description: '西元日期 YYYY-MM-DD（補零），或「Day 1」「Day 2」等格式' },
                time: {type:'STRING'}, title: {type:'STRING'}, note: {type:'STRING'}, place: {type:'STRING'}
              }
            } } } }
      });
      const items = (out?.items || []).map(it => ({
        id: rid(), day: normalizeAiDay(it.day, startIso), time: it.time || '',
        title: (it.title || '').trim(), note: it.note || '', map: (it.place || '').trim()
      })).filter(it => it.title);
      if (!items.length) { setAiErr('AI 沒有產生行程，換個說法再試一次'); }
      else setAiDraft({ summary: out?.summary || '', replace: redesign, items: items.sort(dayThenTime), selected: Object.fromEntries(items.map(i=>[i.id, true])) });
    } catch (e) { console.error(e); setAiErr(fnErr(e)); }
    setAiBusy(false);
  };

  const draftItems = aiDraft?.items || [];
  const selectedDraftCount = draftItems.filter(i=>aiDraft?.selected?.[i.id]).length;
  const toggleDraft = (id) => setAiDraft(d => d && ({ ...d, selected: { ...d.selected, [id]: !d.selected[id] } }));
  const selectAllDraft = (checked) => setAiDraft(d => d && ({ ...d, selected: Object.fromEntries(d.items.map(i=>[i.id, checked])) }));
  const addDraft = () => {
    const chosen = draftItems.filter(i=>aiDraft?.selected?.[i.id]);
    if (!chosen.length) { setAiErr('請先勾選要加入的草稿項目'); return; }
    const existingIso = [...new Set(data.map(i=>i.day))].filter(isIsoDate).sort();
    const anchorIso = existingIso[0] || todayISO();
    const normalizedData = normalizeLegacyDays(data, anchorIso);
    const chosenDays = new Set(chosen.map(i=>i.day));
    const base = aiDraft?.replace ? normalizedData.filter(i => !chosenDays.has(i.day)) : normalizedData;
    save([...base, ...chosen.map(i=>({ ...i, id: rid() }))].sort(dayThenTime));
    setAiDraft(null);
    setAiPrompt('');
    setAiErr('');
  };

  const add = () => {
    if (!form.title.trim()) return;
    const item = { id: Date.now(), ...form, title: form.title.trim(), map: form.map.trim() };
    const existingIso = [...new Set(data.map(i=>i.day))].filter(isIsoDate).sort();
    const anchorIso = existingIso[0] || form.day || todayISO();
    save(normalizeLegacyDays([...data, item], anchorIso).sort(dayThenTime));
    setForm({ ...form, time:'', title:'', note:'', map:'' });
  };
  const del = (id) => save(data.filter(i=>i.id!==id));
  const days = [...new Set(data.map(i=>i.day))];
  const isoDays = days.filter(isIsoDate);
  const dayLabel = (d) => isIsoDate(d) ? `Day ${isoDays.indexOf(d)+1}` : d;
  const draftDays = [...new Set(draftItems.map(i=>i.day))];
  const draftIsoDays = draftDays.filter(isIsoDate);
  const draftDayLabel = (d) => isIsoDate(d) ? `Day ${draftIsoDays.indexOf(d)+1} · ${fmtDayDate(d)}` : d;
  const aiEnter = useConfirmEnter(aiGen);
  const addEnter = useConfirmEnter(add);

  return (
    <div>
      <div className="bg-card border border-line rounded-2xl p-4 mb-4">
        <p className="text-sm font-medium mb-2">✨ AI 排行程</p>
        <div className="flex gap-2">
          <input value={aiPrompt} onChange={e=>setAiPrompt(e.target.value)}
            placeholder={data.length ? '例如：後面接著去神戶二日遊／在第2天加一間拉麵／幫我補東京半日' : '例如：京都三天，喜歡神社和美食，步調悠閒'}
            onKeyDown={aiEnter.onKeyDown} disabled={aiBusy}
            className={cx('flex-1 border rounded-xl px-3 py-2 text-sm', aiEnter.armed?'border-amber2 ring-2 ring-amber2/30':'border-line')} />
          <button onClick={aiGen} disabled={aiBusy}
            className="bg-teal2 text-white px-4 rounded-xl text-sm shrink-0 disabled:opacity-50">
            {aiBusy ? '生成中…' : '生成'}
          </button>
        </div>
        <p className="text-xs text-slate2/70 mt-2">
          {data.length ? 'AI 會先產生草稿，日期自動接在現有行程後面；勾選後再加入正式行程。' : '描述你的旅程，AI 先產生草稿；勾選後再加入正式行程。'}
        </p>
        {aiEnter.armed && <p className="text-xs text-amber2 mt-2">再按一次 Enter 確認送出</p>}
        {aiErr && <p className="text-xs text-red-600 mt-2">{aiErr}</p>}
      </div>

      <div className="bg-card border border-line rounded-2xl p-4 mb-4 flex items-center gap-3 flex-wrap">
        <Icon d={I.cal} cls="w-5 h-5 text-teal2 shrink-0"/>
        {gcal.connected ? (
          <>
            <p className="text-sm flex-1 min-w-0">已連結 <span className="font-medium">{gcal.email}</span></p>
            <button onClick={gcalSyncAll} disabled={gcalBusy || !data.length}
              className="bg-teal2 text-white px-3 py-1.5 rounded-lg text-xs shrink-0 disabled:opacity-50">
              {gcalBusy ? '同步中…' : '同步全部行程'}
            </button>
            <button onClick={gcalDoDisconnect} disabled={gcalBusy}
              className="text-xs text-slate2 hover:text-red-500 shrink-0">取消連結</button>
          </>
        ) : (
          <>
            <p className="text-sm flex-1 min-w-0">把行程加入你的 Google 日曆</p>
            <button onClick={gcalConnect}
              className="bg-teal2 text-white px-3 py-1.5 rounded-lg text-xs shrink-0">連結 Google 日曆</button>
          </>
        )}
        {gcalMsg && <p className="text-xs text-slate2/70 w-full">{gcalMsg}</p>}
      </div>

      {aiDraft && (
        <div className="bg-card border border-amber2/40 rounded-2xl p-4 mb-5">
          <div className="flex items-start justify-between gap-3 mb-3">
            <div>
              <p className="text-sm font-medium">AI 草稿</p>
              <p className="text-xs text-slate2/70 mt-1">
                {aiDraft.summary || '勾選想加入的項目，正式行程還不會變動。'}
              </p>
              {aiDraft.replace && (
                <p className="text-xs text-amber2 mt-1">加入後將直接取代原本這幾天的行程，不會重複累加。</p>
              )}
            </div>
            <button onClick={()=>setAiDraft(null)} className="text-slate2 hover:text-ink shrink-0">
              <Icon d={I.x} cls="w-4 h-4"/>
            </button>
          </div>

          <label className="inline-flex items-center gap-2 text-xs text-slate2 mb-3 cursor-pointer">
            <input type="checkbox" checked={selectedDraftCount === draftItems.length}
              onChange={e=>selectAllDraft(e.target.checked)}
              className="w-4 h-4 accent-teal2" />
            全選 {selectedDraftCount}/{draftItems.length}
          </label>

          <div className="space-y-2 max-h-80 overflow-y-auto pr-1">
            {draftDays.map(day=>(
              <div key={day}>
                <p className="text-xs font-medium text-slate2 mb-1">{draftDayLabel(day)}</p>
                <div className="space-y-2">
                  {draftItems.filter(i=>i.day===day).map(i=>(
                    <label key={i.id}
                      className="flex items-start gap-3 border border-line rounded-xl px-3 py-2 cursor-pointer hover:border-amber2">
                      <input type="checkbox" checked={!!aiDraft.selected[i.id]}
                        onChange={()=>toggleDraft(i.id)}
                        className="w-4 h-4 mt-0.5 accent-teal2 shrink-0" />
                      <span className="font-mono text-xs text-teal2 pt-0.5 w-11 shrink-0">{i.time||'—'}</span>
                      <span className="min-w-0">
                        <span className="block text-sm font-medium">{i.title}</span>
                        {i.note && <span className="block text-xs text-slate2 mt-0.5">{i.note}</span>}
                        {i.map && <span className="block text-xs text-teal2 mt-0.5">📍 {i.map}</span>}
                      </span>
                    </label>
                  ))}
                </div>
              </div>
            ))}
          </div>

          <div className="flex gap-2 mt-4">
            <button onClick={()=>setAiDraft(null)}
              className="px-3 py-2 text-sm rounded-lg border border-line text-slate2 hover:text-ink">
              取消
            </button>
            <button onClick={addDraft} disabled={!selectedDraftCount}
              className="flex-1 bg-ink text-paper rounded-lg py-2 text-sm font-medium disabled:opacity-50">
              加入選取的
            </button>
          </div>
        </div>
      )}

      <div className="bg-card border border-line rounded-2xl p-4 mb-5 grid grid-cols-2 sm:grid-cols-4 gap-2">
        <input type="date" value={form.day} onChange={e=>setForm({...form,day:e.target.value})}
          className="border border-line rounded-lg px-2.5 py-2 text-sm" />
        <input value={form.time} onChange={e=>setForm({...form,time:e.target.value})} placeholder="09:00" type="time"
          className="border border-line rounded-lg px-2.5 py-2 text-sm" />
        <input value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="要去哪、做什麼"
          onKeyDown={addEnter.onKeyDown}
          className={cx('col-span-2 sm:col-span-1 border rounded-lg px-2.5 py-2 text-sm', addEnter.armed?'border-amber2 ring-2 ring-amber2/30':'border-line')} />
        <button onClick={add} className="col-span-2 sm:col-span-1 bg-ink text-paper rounded-lg py-2 text-sm flex items-center justify-center gap-1">
          <Icon d={I.plus} cls="w-4 h-4"/>加入行程
        </button>
        <input value={form.map} onChange={e=>setForm({...form,map:e.target.value})}
          placeholder="Google 地圖連結或地址（選填）" onKeyDown={addEnter.onKeyDown}
          className={cx('col-span-2 sm:col-span-4 border rounded-lg px-2.5 py-2 text-sm', addEnter.armed?'border-amber2 ring-2 ring-amber2/30':'border-line')} />
        {addEnter.armed && <p className="col-span-2 sm:col-span-4 text-xs text-amber2">再按一次 Enter 確認送出</p>}
      </div>

      {data.length===0 ? <Empty text="還沒排定行程。加入第一個景點吧。" /> : days.map(day=>(
        <div key={day} className="mb-6">
          <h3 className="font-display text-lg mb-2 flex items-center gap-2">
            <span className="w-1.5 h-1.5 rounded-full bg-amber2" />{dayLabel(day)}
            {isIsoDate(day) && <span className="text-sm font-sans font-normal text-slate2">· {fmtDayDate(day)}</span>}
          </h3>
          <div className="border-l-2 border-line ml-[3px] pl-4 space-y-2">
            {data.filter(i=>i.day===day).map(i=>(
              <div key={i.id} onClick={()=>setDetail(i)}
                className="bg-card border border-line rounded-xl px-4 py-3 flex items-start gap-3 group cursor-pointer hover:border-amber2">
                <span className="font-mono text-xs text-teal2 pt-0.5 w-11 shrink-0">{i.time||'—'}</span>
                <div className="flex-1 min-w-0">
                  <p className="text-sm font-medium">{i.title}</p>
                  {i.note && <p className="text-xs text-slate2 mt-0.5">{i.note}</p>}
                  {i.map && (
                    <a href={mapExternalUrl(i.map)} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()}
                      className="text-xs text-teal2 inline-flex items-center gap-1 mt-1 hover:underline">
                      <Icon d={I.pin} cls="w-3 h-3"/>導航至此地
                    </a>
                  )}
                </div>
                {gcal.connected && (
                  <button onClick={e=>{e.stopPropagation(); gcalSyncOne(i);}} disabled={syncingId===i.id}
                    title={i.gcalEventId ? '已加入 Google 日曆，點擊更新' : '加入 Google 日曆'}
                    className={cx('shrink-0 disabled:opacity-50', i.gcalEventId ? 'text-teal2' : 'text-line group-hover:text-teal2')}>
                    <Icon d={I.cal} cls="w-4 h-4"/>
                  </button>
                )}
                <button onClick={e=>{e.stopPropagation(); del(i.id);}} className="text-line group-hover:text-red-400"><Icon d={I.trash} cls="w-4 h-4"/></button>
              </div>
            ))}
          </div>
        </div>
      ))}

      {detail && (
        <ItineraryDetail item={detail} onClose={()=>setDetail(null)}
          onSave={(patch)=>{ save(data.map(x=>x.id===detail.id?{...x,...patch}:x).sort(dayThenTime)); setDetail(null); }}
          onDelete={()=>{ del(detail.id); setDetail(null); }} />
      )}
    </div>
  );
}
const dayThenTime = (a,b)=> (a.day+a.time).localeCompare(b.day+b.time);

          <>

                {(dayText || item.time) && (
                  <span>{dayText}{dayText && item.time ? ' · ' : ''}{item.time || ''}</span>

              {item.note && <p className="text-slate2 mt-3 whitespace-pre-wrap break-words">{item.note}</p>}

            {item.map && embedSrc && (

/* ---------------------------- todos / packing --------------------------- */
function Checklist({ items, save, placeholder }) {
  const [text, setText] = useState('');
  const add = () => { if(!text.trim()) return; save([...items,{id:Date.now(),text:text.trim(),done:false}]); setText(''); };
  const toggle = (id)=> save(items.map(i=>i.id===id?{...i,done:!i.done}:i));
  const del = (id)=> save(items.filter(i=>i.id!==id));
  const left = items.filter(i=>!i.done).length;
  const addEnter = useConfirmEnter(add);

  return (
    <div>
      <div className="flex gap-2 mb-1.5">
        <input value={text} onChange={e=>setText(e.target.value)} placeholder={placeholder}
          onKeyDown={addEnter.onKeyDown}
          className={cx('flex-1 border rounded-xl px-3 py-2.5 text-sm bg-card', addEnter.armed?'border-amber2 ring-2 ring-amber2/30':'border-line')} />
        <button onClick={add} className="bg-ink text-paper px-4 rounded-xl flex items-center"><Icon d={I.plus} cls="w-5 h-5"/></button>
      </div>
      {addEnter.armed && <p className="text-xs text-amber2 mb-2.5">再按一次 Enter 確認送出</p>}
      {items.length>0 && <p className="text-xs text-slate2 mb-3">還有 {left} 項未完成</p>}
      {items.length===0 ? <Empty text="清單是空的。" /> : (
        <div className="space-y-2">
          {items.map(i=>(
            <div key={i.id} className="bg-card border border-line rounded-xl px-4 py-3 flex items-center gap-3 group">
              <button onClick={()=>toggle(i.id)}
                className={cx('w-5 h-5 rounded-md border flex items-center justify-center shrink-0',
                  i.done ? 'bg-teal2 border-teal2 text-white' : 'border-line')}>
                {i.done && <Icon d={I.check} cls="w-3.5 h-3.5" />}
              </button>
              <span className={cx('flex-1 text-sm', i.done && 'line-through text-slate2')}>{i.text}</span>
              <button onClick={()=>del(i.id)} className="text-line group-hover:text-red-400"><Icon d={I.trash} cls="w-4 h-4"/></button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* -------------------------------- split -------------------------------- */
function Split({ data, members, me, save }) {
  const names = Object.values(members);
  const [form, setForm] = useState({ title:'', amount:'', ccy: BASE_CCY, payer: me.displayName, participants: names });
  const [aiText, setAiText] = useState('');
  const [aiBusy, setAiBusy] = useState(false);
  const [aiMsg, setAiMsg] = useState('');
  const [aiPending, setAiPending] = useState(null);
  const fileRef = useRef(null);
  const cleanParticipants = (list) => {
    const picked = (Array.isArray(list) ? list : [])
      .map(n => String(n || '').trim())
      .filter(n => names.includes(n));
    return [...new Set(picked)];
  };
  const expenseParticipants = (e) => {
    const picked = cleanParticipants(e.participants);
    return picked.length ? picked : names;
  };
  const splitLabel = (e) => {
    const ps = expenseParticipants(e);
    return ps.length === names.length ? '大家均分' : `${ps.join('、')} 分攤`;
  };
  const toggleFormParticipant = (name) => {
    const current = cleanParticipants(form.participants);
    const next = current.includes(name) ? current.filter(n=>n!==name) : [...current, name];
    setForm({...form, participants: next.length ? next : current});
  };
  useEffect(() => {
    setForm(f => {
      const picked = (Array.isArray(f.participants) ? f.participants : []).filter(n=>names.includes(n));
      return {
        ...f,
        payer: names.includes(f.payer) ? f.payer : (names[0] || me.displayName),
        participants: picked.length ? picked : names
      };
    });
  }, [names.join()]);

  const aiAdd = async () => {
    const t = aiText.trim(); if (!t || aiBusy) return;
    setAiBusy(true); setAiMsg(''); setAiPending(null);
    try {
      const d = await askGemini({
        system: '你是記帳解析助理。從使用者的一句話中抽取消費資訊。' +
          `群組成員：${names.join('、') || '（未知）'}。` +
          `payer 必須是成員名單中的一個名字；若句子沒說是誰付的，用「${me.displayName}」。` +
          'participants 是「實際要分攤/欠這筆錢的人」陣列，名字必須來自群組成員。\n' +
          '判斷規則：\n' +
          `- 「我付/我刷/我先墊」的 payer 是「${me.displayName}」。\n` +
          '- 「A 付/付款/刷卡/先墊」的 payer 是 A。\n' +
          '- 「大家/我們/全員/一起吃/一起搭」表示 participants 是所有群組成員。\n' +
          '- 「我幫 A 付」「A 幫 B 付」「替 B 墊」「幫 B 出」表示 payer 是付錢的人，participants 只放被代付的人，不是大家均分。\n' +
          '- 「A 幫 B 和 C 付」participants 是 B、C。\n' +
          '- 「請客/我請/請大家/招待/我出這餐/我請客」表示付款人自行吸收、其他人不用分攤，participants 只放付款人自己一人。\n' +
          '- 「還/還錢/還給/拿現金給/轉給 B」是還款：payer 是拿出錢的人，participants 只放收到錢的人一人，title 用「還款」。\n' +
          '- 如果只說「我付了 3000 午餐」但沒說幫誰，預設 participants 是所有群組成員。\n' +
          'title 是消費項目（10 字內）；amount 是數字金額（不含幣別符號）。' +
          'currency 是幣別代碼（TWD/JPY/USD/KRW/EUR/CNY/HKD/THB 等）：句子看得出外幣（日圓/円/¥、美金/鎂/$、韓元/원、泰銖…）就填該幣別，看不出來一律填 TWD。',
        user: t,
        schema: { type: 'OBJECT', required: ['title','amount','currency','payer','participants'],
          properties: {
            title: {type:'STRING'}, amount: {type:'NUMBER'}, currency: {type:'STRING'}, payer: {type:'STRING'},
            participants: { type:'ARRAY', items:{ type:'STRING' }, description:'要分攤這筆錢的成員名字' }
          } }
      }) || {};
      const amt = Number(d.amount);
      if (!d.title || !amt) { setAiMsg('AI 看不懂這筆帳，請描述得更清楚一點'); }
      else {
        // 比對 AI 給的名字有沒有對上成員；對不上就先讓使用者確認，
        // 不要靜默記成「你付／全員均分」（那會讓錯誤的分帳悄悄成立）
        const rawParts = (Array.isArray(d.participants) ? d.participants : [])
          .map(n => String(n || '').trim()).filter(Boolean);
        const cleaned = cleanParticipants(d.participants);
        const dropped = [...new Set(rawParts.filter(n => !names.includes(n)))];
        const payerOk = names.includes(d.payer);
        const payer = payerOk ? d.payer : me.displayName;
        const participants = cleaned.length ? cleaned : names;
        const conv = await toTWD(amt, d.currency);
        const expense = { id: rid(), title: d.title, amount: amt, ccy: conv.ccy,
          amountBase: conv.amountBase, noRate: conv.noRate, payer, participants,
          at: new Date().toISOString() };
        const warns = [];
        if (!payerOk && d.payer) warns.push(`付款人「${d.payer}」不在成員名單，先當成「${payer}」付`);
        if (dropped.length) warns.push(`分攤人有對不上的名字：${dropped.join('、')}`);
        if (rawParts.length && !cleaned.length) warns.push('分攤人都對不上，先當成「全員均分」');
        if (conv.noRate) warns.push(`「${conv.ccy}」匯率取得失敗，這筆先以原數字計入、未換算成 TWD`);
        if (warns.length) {
          setAiPending({ expense, warns });   // 有疑慮 → 等使用者確認
        } else {
          save([...data, expense]);
          setAiText('');
        }
      }
    } catch (e) { console.error(e); setAiMsg(fnErr(e)); }
    setAiBusy(false);
  };

  const confirmPending = () => {
    if (!aiPending) return;
    save([...data, aiPending.expense]);
    setAiPending(null); setAiText(''); setAiMsg('');
  };
  const cancelPending = () => setAiPending(null);
  const setPendingPayer = (payer) => setAiPending(p => p && ({ ...p, expense: { ...p.expense, payer } }));
  const togglePendingParticipant = (name) => setAiPending(p => {
    if (!p) return p;
    const current = cleanParticipants(p.expense.participants);
    const next = current.includes(name) ? current.filter(n=>n!==name) : [...current, name];
    return { ...p, expense: { ...p.expense, participants: next.length ? next : current } };
  });

  const onReceipt = (file) => {
    if (!file || aiBusy) return;
    if (!/^image\/(jpeg|png|webp|gif)$/.test(file.type)) { setAiMsg('請選擇 JPG／PNG／WebP 圖片'); return; }
    if (file.size > 4 * 1024 * 1024) { setAiMsg('圖片太大，請小於 4MB'); return; }
    const r = new FileReader();
    r.onload = async () => {
      setAiBusy(true); setAiMsg('');
      try {
        const b64 = String(r.result).split(',')[1];
        const d = await askGemini({
          system: '你是收據辨識助理。從收據照片抽取：title（店名或消費摘要，10 字內）、' +
            'amount（總金額數字）、currency（幣別代碼如 TWD/JPY/USD，看不出來就填 TWD）。' +
            '金額以收據上的「總計/合計/Total」為準。',
          user: '請辨識這張收據。',
          image: { mimeType: file.type, data: b64 },
          schema: { type: 'OBJECT', required: ['title','amount','currency'],
            properties: { title: {type:'STRING'}, amount: {type:'NUMBER'}, currency: {type:'STRING'} } }
        }) || {};
        const amt = Number(d.amount);
        if (!amt) { setAiMsg('讀不出收據金額，請改用手動輸入'); }
        else {
          const conv = await toTWD(amt, d.currency);
          const expense = { id: rid(), title: d.title || '收據消費',
            amount: amt, ccy: conv.ccy, amountBase: conv.amountBase, noRate: conv.noRate,
            payer: me.displayName, participants: names, at: new Date().toISOString() };
          const warns = conv.noRate ? [`「${conv.ccy}」匯率取得失敗，這筆先以原數字計入、未換算成 TWD`] : [];
          setAiPending({ expense, warns });   // 讓使用者確認/調整付款人與分攤人，不要直接預設全員均分
        }
      } catch (e) { console.error(e); setAiMsg(fnErr(e)); }
      setAiBusy(false);
    };
    r.readAsDataURL(file);
  };

  const add = async () => {
    const amt = parseFloat(form.amount);
    if (!form.title.trim() || !amt) return;
    const participants = cleanParticipants(form.participants);
    const conv = await toTWD(amt, form.ccy);
    save([...data, { id:Date.now(), title:form.title.trim(), amount:amt, ccy:conv.ccy,
      amountBase:conv.amountBase, noRate:conv.noRate, payer:form.payer,
      participants: participants.length ? participants : names, at:new Date().toISOString() }]);
    setForm({ ...form, title:'', amount:'' });
  };
  const del = (id)=> save(data.filter(e=>e.id!==id));
  const aiEnter = useConfirmEnter(aiAdd);

  const settle = useMemo(()=>{
    const bal = {}; names.forEach(n=>bal[n]=0);
    data.forEach(e=>{
      const amt = baseAmt(e);
      const participants = expenseParticipants(e);
      const share = participants.length ? amt / participants.length : 0;
      if (bal[e.payer]!=null) bal[e.payer]+=amt;
      participants.forEach(n=>{ if(bal[n]!=null) bal[n]-=share; });
    });
    names.forEach(n=> bal[n] = Math.round(bal[n]));
    return { bal, total: data.reduce((s,e)=>s+baseAmt(e),0) };
  }, [data, names.join()]);

  return (
    <div>
      <div className="bg-card border border-line rounded-2xl p-4 mb-4">
        <p className="text-sm font-medium mb-2">✨ AI 記帳</p>
        <div className="flex gap-2">
          <input value={aiText} onChange={e=>setAiText(e.target.value)}
            placeholder="小明付了 3000 晚餐大家分／小明幫小美付 1000 午餐"
            onKeyDown={aiEnter.onKeyDown} disabled={aiBusy}
            className={cx('flex-1 min-w-0 border rounded-xl px-3 py-2 text-sm', aiEnter.armed?'border-amber2 ring-2 ring-amber2/30':'border-line')} />
          <button onClick={aiAdd} disabled={aiBusy}
            className="bg-teal2 text-white px-3 rounded-xl text-sm shrink-0 disabled:opacity-50">
            {aiBusy ? '解析中…' : '記帳'}
          </button>
          <button onClick={()=>fileRef.current?.click()} disabled={aiBusy} title="拍收據自動記帳"
            className="border border-line rounded-xl px-3 text-sm shrink-0 disabled:opacity-50">📷</button>
          <input ref={fileRef} type="file" accept="image/*" className="hidden"
            onChange={e=>{ onReceipt(e.target.files[0]); e.target.value=''; }} />
        </div>
        {aiEnter.armed && <p className="text-xs text-amber2 mt-2">再按一次 Enter 確認送出</p>}
        {aiMsg && <p className="text-xs text-red-600 mt-2">{aiMsg}</p>}
        {aiPending && (
          <div className="mt-3 border border-amber2/40 bg-amber2/5 rounded-xl p-3 text-xs">
            <p className="font-medium mb-1">請確認這筆記帳，可調整付款人／分攤人</p>
            <p className="mb-2 text-slate2">
              {fmtOrig(aiPending.expense)}
              {isForeign(aiPending.expense) && !aiPending.expense.noRate ? ` (≈NT$${baseAmt(aiPending.expense).toLocaleString()})` : ''}
            </p>
            {aiPending.warns.length > 0 && (
              <ul className="list-disc pl-4 mb-2 text-amber2">
                {aiPending.warns.map((w,i)=><li key={i}>{w}</li>)}
              </ul>
            )}
            <p className="text-slate2 mb-1">付款人</p>
            <select value={aiPending.expense.payer} onChange={e=>setPendingPayer(e.target.value)}
              className="border border-line rounded-lg px-2 py-1.5 mb-2 bg-card">
              {names.map(n=><option key={n}>{n}</option>)}
            </select>
            <p className="text-slate2 mb-1">分攤人</p>
            <div className="flex flex-wrap gap-2 mb-3">
              {names.map(n=>(
                <label key={n}
                  className={cx('border rounded-full px-3 py-1.5 cursor-pointer',
                    cleanParticipants(aiPending.expense.participants).includes(n) ? 'border-teal2 bg-teal2/5 text-teal2' : 'border-line text-slate2')}>
                  <input type="checkbox" checked={cleanParticipants(aiPending.expense.participants).includes(n)}
                    onChange={()=>togglePendingParticipant(n)} className="sr-only" />
                  {n}
                </label>
              ))}
            </div>
            <div className="flex gap-2">
              <button onClick={confirmPending}
                className="bg-teal2 text-white px-3 py-1.5 rounded-lg">確認記帳</button>
              <button onClick={cancelPending}
                className="border border-line px-3 py-1.5 rounded-lg">取消，改手動</button>
            </div>
          </div>
        )}
      </div>

      <div className="bg-card border border-line rounded-2xl p-4 mb-5 grid grid-cols-2 gap-2">
        <input value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="項目，例如：晚餐"
          className="col-span-2 border border-line rounded-lg px-2.5 py-2 text-sm" />
        <div className="flex gap-1">
          <input value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})} placeholder="金額" type="number"
            className="flex-1 min-w-0 border border-line rounded-lg px-2.5 py-2 text-sm" />
          <select value={form.ccy} onChange={e=>setForm({...form,ccy:e.target.value})}
            className="w-[4.5rem] shrink-0 border border-line rounded-lg px-1 py-2 text-sm bg-card">
            {CCYS.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
        <select value={form.payer} onChange={e=>setForm({...form,payer:e.target.value})}
          className="border border-line rounded-lg px-2.5 py-2 text-sm bg-card">
          {names.map(n=><option key={n}>{n}</option>)}
        </select>
        <div className="col-span-2">
          <p className="text-xs text-slate2 mb-1">分攤人</p>
          <div className="flex flex-wrap gap-2">
            {names.map(n=>(
              <label key={n}
                className={cx('text-xs border rounded-full px-3 py-1.5 cursor-pointer',
                  cleanParticipants(form.participants).includes(n) ? 'border-teal2 bg-teal2/5 text-teal2' : 'border-line text-slate2')}>
                <input type="checkbox" checked={cleanParticipants(form.participants).includes(n)}
                  onChange={()=>toggleFormParticipant(n)} className="sr-only" />
                {n}
              </label>
            ))}
          </div>
        </div>
        <button onClick={add} className="col-span-2 bg-ink text-paper rounded-lg py-2 text-sm flex items-center justify-center gap-1">
          <Icon d={I.plus} cls="w-4 h-4"/>記一筆
        </button>
      </div>

      {data.length>0 && (
        <div className="bg-teal2/5 border border-teal2/20 rounded-2xl p-4 mb-5">
          <div className="flex justify-between text-sm mb-3">
            <span className="text-slate2">總支出 <b className="text-ink">NT${settle.total.toLocaleString()}</b></span>
            <span className="text-slate2">外幣已換算為 TWD</span>
          </div>
          <div className="space-y-1.5">
            {names.map(n=>{
              const v = settle.bal[n];
              return (
                <div key={n} className="flex justify-between text-sm">
                  <span>{n}</span>
                  <span className={v>0?'text-teal2':v<0?'text-red-500':'text-slate2'}>
                    {v>0?`應收回 NT$${v.toLocaleString()}`:v<0?`要付 NT$${Math.abs(v).toLocaleString()}`:'剛好'}
                  </span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {data.length===0 ? <Empty text="還沒有花費紀錄。" /> : (
        <div className="space-y-2">
          {data.slice().reverse().map(e=>(
            <div key={e.id} className="bg-card border border-line rounded-xl px-4 py-3 flex items-center gap-3 group">
              <div className="flex-1">
                <p className="text-sm font-medium">{e.title}</p>
                <p className="text-xs text-slate2">{e.payer} 付款 · {splitLabel(e)}</p>
              </div>
              <div className="text-right shrink-0">
                <span className="text-sm font-mono">{fmtOrig(e)}</span>
                {isForeign(e) && (
                  <p className="text-[11px] text-slate2 font-mono">{e.noRate ? '未換算' : `≈ NT$${baseAmt(e).toLocaleString()}`}</p>
                )}
              </div>
              <button onClick={()=>del(e.id)} className="text-line group-hover:text-red-400"><Icon d={I.trash} cls="w-4 h-4"/></button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* --------------------------------- chat --------------------------------- */
function Chat({ groupId, me }) {
  const [msgs, setMsgs] = useState([]);
  const [text, setText] = useState('');
  const endRef = useRef(null);

  useEffect(() => {
    const unsub = db.collection('groups').doc(groupId).collection('messages')
      .orderBy('createdAt','asc').limitToLast(200)
      .onSnapshot(s => setMsgs(s.docs.map(d=>({id:d.id,...d.data()}))));
    return unsub;
  }, [groupId]);

  useEffect(()=>{ endRef.current?.scrollIntoView({behavior:'smooth'}); }, [msgs]);

  const send = async () => {
    const t = text.trim();
    setText('');
    if(!t) return;
    await db.collection('groups').doc(groupId).collection('messages').add({
      uid: me.uid, name: me.displayName, text: t, createdAt: FV.serverTimestamp()
    });
  };
  const onTextKeyDown = (e) => {
    if (e.key !== 'Enter' || e.nativeEvent.isComposing) return;
    e.preventDefault();
    send();
  };

  return (
    <div className="flex flex-col h-[calc(100vh-11rem)]">
      <div className="flex-1 overflow-y-auto space-y-3 pb-3">
        {msgs.length===0 && <Empty text="開始聊這趟旅程吧。" />}
        {msgs.map(m=>{
          const mine = m.uid===me.uid;
          return (
            <div key={m.id} className={cx('flex flex-col', mine?'items-end':'items-start')}>
              {!mine && <span className="text-xs text-slate2 mb-0.5 px-1">{m.name}</span>}
              <div className={cx('max-w-[78%] px-3.5 py-2 rounded-2xl text-sm',
                mine ? 'bg-ink text-paper rounded-br-sm' : 'bg-card border border-line rounded-bl-sm')}>
                {m.text}
              </div>
              <span className="text-[10px] text-slate2/60 mt-0.5 px-1">{fmtTime(m.createdAt)}</span>
            </div>
          );
        })}
        <div ref={endRef} />
      </div>
      <div className="flex gap-2 pt-2 border-t border-line">
        <input value={text} onChange={e=>setText(e.target.value)} placeholder="輸入訊息…"
          onKeyDown={onTextKeyDown}
          className="flex-1 border border-line rounded-full px-4 py-2.5 text-sm bg-card" />
        <button onClick={send} className="bg-amber2 text-white w-11 rounded-full flex items-center justify-center shrink-0">
          <Icon d={I.send} cls="w-5 h-5" />
        </button>
      </div>
    </div>
  );
}

/* ------------------------------- currency ------------------------------- */
const FALLBACK = { TWD:1, JPY:4.6, USD:0.031, EUR:0.029, KRW:42, CNY:0.22, HKD:0.24, THB:1.1, GBP:0.025 };
function Currency() {
  const [rates, setRates] = useState(null);
  const [note, setNote] = useState('');
  const [from, setFrom] = useState('TWD');
  const [to, setTo] = useState('JPY');
  const [amt, setAmt] = useState('1000');

  useEffect(() => {
    fetch('https://api.exchangerate-api.com/v4/latest/TWD')
      .then(r=>r.json())
      .then(d=>{ setRates(d.rates); setNote('更新於 '+new Date().toLocaleString('zh-TW')); })
      .catch(()=>{ setRates(FALLBACK); setNote('離線匯率（僅供參考）'); });
  }, []);

  const list = rates ? Object.keys(FALLBACK).filter(c=>rates[c]) : Object.keys(FALLBACK);
  const out = useMemo(()=>{
    const a = parseFloat(amt); if(!rates||!a) return '';
    const inTWD = from==='TWD'? a : a/rates[from];
    const res = to==='TWD'? inTWD : inTWD*rates[to];
    return res.toLocaleString('zh-TW',{maximumFractionDigits:2});
  }, [amt,from,to,rates]);

  return (
    <div className="max-w-md mx-auto">
      <div className="bg-card border border-line rounded-2xl p-5">
        <div className="grid grid-cols-2 gap-3 mb-4">
          <label className="block">
            <span className="text-xs text-slate2">從</span>
            <select value={from} onChange={e=>setFrom(e.target.value)} className="mt-1 w-full border border-line rounded-xl px-3 py-2.5 text-sm bg-card">
              {list.map(c=><option key={c}>{c}</option>)}
            </select>
          </label>
          <label className="block">
            <span className="text-xs text-slate2">到</span>
            <select value={to} onChange={e=>setTo(e.target.value)} className="mt-1 w-full border border-line rounded-xl px-3 py-2.5 text-sm bg-card">
              {list.map(c=><option key={c}>{c}</option>)}
            </select>
          </label>
        </div>
        <input value={amt} onChange={e=>setAmt(e.target.value)} type="number"
          className="w-full border border-line rounded-xl px-3 py-3 text-lg font-mono" />
        <div className="text-center py-5">
          <p className="font-display text-4xl text-ink">{out||'—'}</p>
          <p className="text-sm text-slate2 mt-1">{to}</p>
        </div>
        <p className="text-xs text-slate2/70 text-center">{note}</p>
      </div>
    </div>
  );
}

const Empty = ({text}) => (
  <div className="text-center py-14 text-slate2/70 text-sm">{text}</div>
);

/* --------------------------------- root --------------------------------- */
function App() {
  const [user, setUser] = useState(undefined);
  useEffect(() => auth.onAuthStateChanged(u => setUser(u)), []);

  if (user === undefined) return <div className="min-h-screen flex items-center justify-center text-slate2">載入中…</div>;
  return user ? <GroupsScreen user={user} /> : <AuthScreen />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

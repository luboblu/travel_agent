<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅行規劃師 - Travel Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Icons
        const MapPin = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
            </svg>
        );

        const Calendar = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
        );

        const Plus = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
            </svg>
        );

        const Edit = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
            </svg>
        );

        const Trash = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
        );

        const LogOut = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
        );

        const ExternalLink = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
            </svg>
        );

        const Users = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
        );

        // 登入頁面
        function LoginPage({ onLogin }) {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [isRegister, setIsRegister] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!username || !password) {
                    alert('請輸入使用者名稱和密碼');
                    return;
                }

                const users = JSON.parse(localStorage.getItem('users') || '{}');
                
                if (isRegister) {
                    if (users[username]) {
                        alert('使用者名稱已存在');
                        return;
                    }
                    users[username] = { password, role: 'user' };
                    localStorage.setItem('users', JSON.stringify(users));
                    alert('註冊成功！請登入');
                    setIsRegister(false);
                } else {
                    if (!users[username] || users[username].password !== password) {
                        alert('使用者名稱或密碼錯誤');
                        return;
                    }
                    onLogin({ username, role: users[username].role });
                }
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 via-purple-50 to-pink-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
                        <div className="text-center mb-8">
                            <div className="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                                <MapPin className="w-10 h-10 text-white" />
                            </div>
                            <h1 className="text-3xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
                                旅行規劃師
                            </h1>
                            <p className="text-gray-600 mt-2">
                                {isRegister ? '建立新帳號' : '登入你的帳號'}
                            </p>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">
                                    使用者名稱
                                </label>
                                <input
                                    type="text"
                                    value={username}
                                    onChange={(e) => setUsername(e.target.value)}
                                    className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                    placeholder="輸入使用者名稱"
                                />
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">
                                    密碼
                                </label>
                                <input
                                    type="password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                    placeholder="輸入密碼"
                                />
                            </div>

                            <button
                                type="submit"
                                className="w-full bg-gradient-to-r from-blue-500 to-purple-600 text-white py-3 rounded-lg font-semibold hover:shadow-lg transition-all"
                            >
                                {isRegister ? '註冊' : '登入'}
                            </button>
                        </form>

                        <div className="mt-6 text-center">
                            <button
                                onClick={() => setIsRegister(!isRegister)}
                                className="text-blue-600 hover:text-blue-800"
                            >
                                {isRegister ? '已有帳號？登入' : '沒有帳號？註冊'}
                            </button>
                        </div>

                        <div className="mt-6 p-4 bg-gray-50 rounded-lg text-sm text-gray-600">
                            <p className="font-semibold mb-2">測試帳號：</p>
                            <p>管理員: admin / admin123</p>
                            <p>使用者: user / user123</p>
                        </div>
                    </div>
                </div>
            );
        }

        // 主應用程式
        function TravelApp() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('itinerary');
            
            // 共享資料（所有用戶看到相同內容）
            const [sharedTodoItems, setSharedTodoItems] = useState([]);
            const [sharedItinerary, setSharedItinerary] = useState([]);
            
            // 個人資料（每個用戶獨立）
            const [personalPackingItems, setPersonalPackingItems] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [splitBill, setSplitBill] = useState({ members: [], expenses: [] });

            // 編輯模式
            const [editingItem, setEditingItem] = useState(null);
            const [editText, setEditText] = useState('');

            // 初始化測試帳號
            useEffect(() => {
                const users = JSON.parse(localStorage.getItem('users') || '{}');
                if (Object.keys(users).length === 0) {
                    users['admin'] = { password: 'admin123', role: 'admin' };
                    users['user'] = { password: 'user123', role: 'user' };
                    localStorage.setItem('users', JSON.stringify(users));
                }
            }, []);

            // 載入共享資料
            useEffect(() => {
                const sharedData = JSON.parse(localStorage.getItem('sharedData') || '{}');
                setSharedTodoItems(sharedData.todoItems || [
                    { id: 1, text: '訂機票', completed: true, priority: true },
                    { id: 2, text: '訂飯店', completed: true, priority: true },
                    { id: 3, text: '申請港簽', completed: false, priority: true }
                ]);
                setSharedItinerary(sharedData.itinerary || [
                    {
                        id: 1,
                        day: 1,
                        date: '2026-02-01',
                        title: '東京淺草寺',
                        time: '09:00',
                        location: '東京都台東區淺草2-3-1',
                        description: '東京最古老的寺廟，必訪景點',
                        mapUrl: 'https://maps.google.com/?q=淺草寺',
                        websiteUrl: 'https://www.senso-ji.jp/',
                        category: 'attraction'
                    }
                ]);
            }, []);

            // 載入個人資料
            useEffect(() => {
                if (user) {
                    const userData = JSON.parse(localStorage.getItem(`userData_${user.username}`) || '{}');
                    setPersonalPackingItems(userData.packingItems || [
                        { id: 1, text: '充電線', completed: false },
                        { id: 2, text: '行充', completed: false },
                        { id: 3, text: '梳子', completed: false }
                    ]);
                    setExpenses(userData.expenses || []);
                    setSplitBill(userData.splitBill || { members: [], expenses: [] });
                }
            }, [user]);

            // 儲存共享資料
            const saveSharedData = () => {
                const sharedData = {
                    todoItems: sharedTodoItems,
                    itinerary: sharedItinerary
                };
                localStorage.setItem('sharedData', JSON.stringify(sharedData));
            };

            // 儲存個人資料
            const savePersonalData = () => {
                if (user) {
                    const userData = {
                        packingItems: personalPackingItems,
                        expenses,
                        splitBill
                    };
                    localStorage.setItem(`userData_${user.username}`, JSON.stringify(userData));
                }
            };

            useEffect(() => {
                saveSharedData();
            }, [sharedTodoItems, sharedItinerary]);

            useEffect(() => {
                savePersonalData();
            }, [personalPackingItems, expenses, splitBill]);

            if (!user) {
                return <LoginPage onLogin={setUser} />;
            }

            const todoProgress = sharedTodoItems.length > 0 
                ? Math.round((sharedTodoItems.filter(item => item.completed).length / sharedTodoItems.length) * 100)
                : 0;

            const packingProgress = personalPackingItems.length > 0
                ? Math.round((personalPackingItems.filter(item => item.completed).length / personalPackingItems.length) * 100)
                : 0;

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 via-purple-50 to-pink-50">
                    {/* Header */}
                    <header className="bg-white shadow-md sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 py-4">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
                                        <MapPin className="w-6 h-6 text-white" />
                                    </div>
                                    <h1 className="text-2xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
                                        旅行規劃師
                                    </h1>
                                </div>
                                <div className="flex items-center gap-4">
                                    <span className="text-sm text-gray-600">
                                        歡迎, <strong>{user.username}</strong>
                                        {user.role === 'admin' && ' (管理員)'}
                                    </span>
                                    <button
                                        onClick={() => setUser(null)}
                                        className="flex items-center gap-2 px-3 py-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors"
                                    >
                                        <LogOut className="w-4 h-4" />
                                        登出
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Navigation */}
                    <div className="max-w-7xl mx-auto px-4 py-6">
                        <div className="bg-white rounded-xl shadow-sm p-2 flex gap-2 overflow-x-auto">
                            {[
                                { id: 'itinerary', name: '行程規劃', icon: Calendar },
                                { id: 'checklist', name: '準備清單', icon: '📋' },
                                { id: 'currency', name: '匯率換算', icon: '💱' },
                                { id: 'expenses', name: '記帳本', icon: '💰' },
                                { id: 'split', name: '分帳本', icon: Users }
                            ].map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`flex items-center gap-2 px-4 py-2 rounded-lg transition-all whitespace-nowrap ${
                                        activeTab === tab.id
                                            ? 'bg-gradient-to-r from-blue-500 to-purple-600 text-white shadow-md'
                                            : 'text-gray-600 hover:bg-gray-100'
                                    }`}
                                >
                                    {typeof tab.icon === 'string' ? (
                                        <span>{tab.icon}</span>
                                    ) : (
                                        <tab.icon className="w-4 h-4" />
                                    )}
                                    {tab.name}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="max-w-7xl mx-auto px-4 pb-12">
                        {/* 行程規劃 */}
                        {activeTab === 'itinerary' && (
                            <div className="space-y-6">
                                <div className="bg-white rounded-2xl shadow-lg p-8">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-2xl font-bold text-gray-800">🗓️ 行程規劃</h2>
                                        {user.role === 'admin' && (
                                            <button
                                                onClick={() => {
                                                    const title = prompt('行程名稱:');
                                                    if (!title) return;
                                                    const date = prompt('日期 (YYYY-MM-DD):');
                                                    const time = prompt('時間 (HH:MM):');
                                                    const location = prompt('地點:');
                                                    const description = prompt('描述:');
                                                    const mapUrl = prompt('Google Maps 連結:');
                                                    const websiteUrl = prompt('網站連結:');
                                                    
                                                    setSharedItinerary([...sharedItinerary, {
                                                        id: Date.now(),
                                                        day: sharedItinerary.length + 1,
                                                        date,
                                                        title,
                                                        time,
                                                        location,
                                                        description,
                                                        mapUrl,
                                                        websiteUrl,
                                                        category: 'attraction'
                                                    }]);
                                                }}
                                                className="flex items-center gap-2 px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600"
                                            >
                                                <Plus className="w-4 h-4" />
                                                新增行程
                                            </button>
                                        )}
                                    </div>

                                    <div className="space-y-4">
                                        {sharedItinerary.map(item => (
                                            <div key={item.id} className="border-2 border-blue-200 rounded-xl p-6 hover:shadow-lg transition-all">
                                                <div className="flex justify-between items-start mb-3">
                                                    <div className="flex-1">
                                                        <div className="flex items-center gap-3 mb-2">
                                                            <span className="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm font-semibold">
                                                                Day {item.day}
                                                            </span>
                                                            <span className="text-gray-600">{item.date}</span>
                                                            <span className="text-gray-600">{item.time}</span>
                                                        </div>
                                                        <h3 className="text-xl font-bold text-gray-800 mb-2">{item.title}</h3>
                                                        <p className="text-gray-600 mb-2">📍 {item.location}</p>
                                                        <p className="text-gray-700">{item.description}</p>
                                                        
                                                        <div className="flex gap-3 mt-4">
                                                            {item.mapUrl && (
                                                                <a
                                                                    href={item.mapUrl}
                                                                    target="_blank"
                                                                    rel="noopener noreferrer"
                                                                    className="flex items-center gap-2 px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600"
                                                                >
                                                                    <MapPin className="w-4 h-4" />
                                                                    開啟地圖
                                                                    <ExternalLink className="w-3 h-3" />
                                                                </a>
                                                            )}
                                                            {item.websiteUrl && (
                                                                <a
                                                                    href={item.websiteUrl}
                                                                    target="_blank"
                                                                    rel="noopener noreferrer"
                                                                    className="flex items-center gap-2 px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600"
                                                                >
                                                                    查看網站
                                                                    <ExternalLink className="w-3 h-3" />
                                                                </a>
                                                            )}
                                                        </div>
                                                    </div>
                                                    {user.role === 'admin' && (
                                                        <button
                                                            onClick={() => {
                                                                if (confirm('確定要刪除此行程嗎？')) {
                                                                    setSharedItinerary(sharedItinerary.filter(i => i.id !== item.id));
                                                                }
                                                            }}
                                                            className="text-red-500 hover:bg-red-50 p-2 rounded-lg"
                                                        >
                                                            <Trash className="w-5 h-5" />
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    {sharedItinerary.length === 0 && (
                                        <p className="text-gray-400 text-center py-12">
                                            {user.role === 'admin' 
                                                ? '尚未新增行程，點擊上方按鈕開始規劃！' 
                                                : '目前還沒有行程規劃'}
                                        </p>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* 準備清單 */}
                        {activeTab === 'checklist' && (
                            <div className="space-y-6">
                                {/* 待辦清單 - 共享 */}
                                <div className="bg-white rounded-2xl shadow-lg p-8">
                                    <div className="flex justify-between items-center mb-4">
                                        <h2 className="text-2xl font-bold text-gray-800">📋 待辦清單 TO-DO</h2>
                                        <span className="text-sm text-gray-600">進度: {todoProgress}%</span>
                                    </div>
                                    <div className="w-full bg-gray-200 rounded-full h-2 mb-6">
                                        <div 
                                            className="bg-gradient-to-r from-blue-500 to-purple-600 h-2 rounded-full transition-all"
                                            style={{ width: `${todoProgress}%` }}
                                        />
                                    </div>
                                    
                                    <div className="space-y-3 mb-4">
                                        {sharedTodoItems.map(item => (
                                            <div key={item.id} className="flex items-center gap-3 p-4 border border-gray-200 rounded-lg hover:bg-gray-50">
                                                <input
                                                    type="checkbox"
                                                    checked={item.completed}
                                                    onChange={() => {
                                                        setSharedTodoItems(sharedTodoItems.map(i => 
                                                            i.id === item.id ? { ...i, completed: !i.completed } : i
                                                        ));
                                                    }}
                                                    className="w-5 h-5 text-blue-600"
                                                />
                                                {editingItem === item.id ? (
                                                    <input
                                                        type="text"
                                                        value={editText}
                                                        onChange={(e) => setEditText(e.target.value)}
                                                        onKeyDown={(e) => {
                                                            if (e.key === 'Enter') {
                                                                setSharedTodoItems(sharedTodoItems.map(i =>
                                                                    i.id === item.id ? { ...i, text: editText } : i
                                                                ));
                                                                setEditingItem(null);
                                                            }
                                                        }}
                                                        className="flex-1 px-3 py-2 border border-blue-500 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                                        autoFocus
                                                    />
                                                ) : (
                                                    <span className={`flex-1 ${item.completed ? 'line-through text-gray-400' : ''}`}>
                                                        {item.text}
                                                    </span>
                                                )}
                                                {item.priority && <span className="text-red-500 text-xl">⭐</span>}
                                                {user.role === 'admin' && (
                                                    <div className="flex gap-2">
                                                        {editingItem === item.id ? (
                                                            <button
                                                                onClick={() => {
                                                                    setSharedTodoItems(sharedTodoItems.map(i =>
                                                                        i.id === item.id ? { ...i, text: editText } : i
                                                                    ));
                                                                    setEditingItem(null);
                                                                }}
                                                                className="text-green-600 hover:bg-green-50 p-2 rounded-lg"
                                                            >
                                                                ✓
                                                            </button>
                                                        ) : (
                                                            <button
                                                                onClick={() => {
                                                                    setEditingItem(item.id);
                                                                    setEditText(item.text);
                                                                }}
                                                                className="text-blue-500 hover:bg-blue-50 p-2 rounded-lg"
                                                            >
                                                                <Edit className="w-4 h-4" />
                                                            </button>
                                                        )}
                                                        <button
                                                            onClick={() => setSharedTodoItems(sharedTodoItems.filter(i => i.id !== item.id))}
                                                            className="text-red-500 hover:bg-red-50 p-2 rounded-lg"
                                                        >
                                                            <Trash className="w-4 h-4" />
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>

                                    {user.role === 'admin' && (
                                        <button
                                            onClick={() => {
                                                const text = prompt('新增待辦事項:');
                                                if (text) {
                                                    setSharedTodoItems([...sharedTodoItems, {
                                                        id: Date.now(),
                                                        text,
                                                        completed: false,
                                                        priority: false
                                                    }]);
                                                }
                                            }}
                                            className="flex items-center gap-2 px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600"
                                        >
                                            <Plus className="w-4 h-4" />
                                            新增項目
                                        </button>
                                    )}
                                </div>

                                {/* 整理行李 - 個人 */}
                                <div className="bg-white rounded-2xl shadow-lg p-8">
                                    <div className="flex justify-between items-center mb-4">
                                        <h2 className="text-2xl font-bold text-gray-800">🎒 整理行李 PACKING</h2>
                                        <span className="text-sm text-gray-600">進度: {packingProgress}%</span>
                                    </div>
                                    <div className="w-full bg-gray-200 rounded-full h-2 mb-6">
                                        <div 
                                            className="bg-gradient-to-r from-green-500 to-teal-600 h-2 rounded-full transition-all"
                                            style={{ width: `${packingProgress}%` }}
                                        />
                                    </div>
                                    
                                    <div className="grid md:grid-cols-2 gap-3 mb-4">
                                        {personalPackingItems.map(item => (
                                            <div key={item.id} className="flex items-center gap-3 p-4 border border-gray-200 rounded-lg hover:bg-gray-50">
                                                <input
                                                    type="checkbox"
                                                    checked={item.completed}
                                                    onChange={() => {
                                                        setPersonalPackingItems(personalPackingItems.map(i => 
                                                            i.id === item.id ? { ...i, completed: !i.completed } : i
                                                        ));
                                                    }}
                                                    className="w-5 h-5 text-green-600"
                                                />
                                                <span className={`flex-1 ${item.completed ? 'line-through text-gray-400' : ''}`}>
                                                    {item.text}
                                                </span>
                                                <button
                                                    onClick={() => setPersonalPackingItems(personalPackingItems.filter(i => i.id !== item.id))}
                                                    className="text-red-500 hover:bg-red-50 p-2 rounded-lg"
                                                >
                                                    <Trash className="w-4 h-4" />
                                                </button>
                                            </div>
                                        ))}
                                    </div>

                                    <button
                                        onClick={() => {
                                            const text = prompt('新增行李項目:');
                                            if (text) {
                                                setPersonalPackingItems([...personalPackingItems, {
                                                    id: Date.now(),
                                                    text,
                                                    completed: false
                                                }]);
                                            }
                                        }}
                                        className="flex items-center gap-2 px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600"
                                    >
                                        <Plus className="w-4 h-4" />
                                        新增項目
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* 匯率換算 - 日本 */}
                        {activeTab === 'currency' && (
                            <div className="bg-white rounded-2xl shadow-lg p-8">
                                <div className="max-w-md mx-auto">
                                    <div className="text-center mb-8">
                                        <h2 className="text-3xl font-bold text-gray-800 mb-2">💱 匯率換算</h2>
                                        <p className="text-gray-600">JPY ⇄ TWD</p>
                                    </div>

                                    <div className="mb-6">
                                        <label className="block text-sm text-gray-600 mb-2">日幣金額 (JPY)</label>
                                        <input
                                            type="number"
                                            placeholder="輸入日幣..."
                                            className="w-full px-4 py-4 border-2 border-gray-300 rounded-lg text-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                            onChange={(e) => {
                                                const twd = e.target.value ? (parseFloat(e.target.value) * 0.22).toFixed(2) : '';
                                                document.getElementById('twdInput').innerText = twd ? `NT$ ${parseFloat(twd).toLocaleString()}` : 'NT$ 0';
                                            }}
                                        />
                                    </div>

                                    <div className="text-center py-4">
                                        <div className="inline-flex items-center gap-3 bg-blue-50 px-6 py-3 rounded-full">
                                            <span className="text-blue-600 font-semibold">當前匯率: 0.22</span>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-sm text-gray-600 mb-2">約合台幣</label>
                                        <div className="bg-gray-50 border-2 border-dashed border-gray-300 rounded-lg p-6 text-center">
                                            <div className="text-4xl font-bold text-gray-800" id="twdInput">
                                                NT$ 0
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 記帳本 */}
                        {activeTab === 'expenses' && (
                            <div className="bg-white rounded-2xl shadow-lg p-8">
                                <h2 className="text-2xl font-bold text-gray-800 mb-6">💰 記帳小幫手</h2>
                                <p className="text-gray-600 text-center py-12">記帳功能開發中...</p>
                            </div>
                        )}

                        {/* 分帳本 */}
                        {activeTab === 'split' && (
                            <div className="bg-white rounded-2xl shadow-lg p-8">
                                <h2 className="text-2xl font-bold text-gray-800 mb-6">👥 多人分帳本</h2>
                                <p className="text-gray-600 text-center py-12">分帳功能開發中...</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TravelApp />);
    </script>
</body>
</html>

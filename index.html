<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅行規劃師 - 完整版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Icons
        const MapPin = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
            </svg>
        );

        const CheckSquare = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
            </svg>
        );

        const Calendar = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
        );

        const DollarSign = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        );

        const Users = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
        );

        const Plus = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
            </svg>
        );

        const LogOut = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
        );

        const X = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
            </svg>
        );

        // 匯率換算功能
        function CurrencyConverter() {
            const [hkd, setHkd] = useState('');
            const [twd, setTwd] = useState('');
            const rate = 4.05; // HKD to TWD

            const handleHkdChange = (value) => {
                setHkd(value);
                setTwd(value ? (parseFloat(value) * rate).toFixed(2) : '');
            };

            const handleTwdChange = (value) => {
                setTwd(value);
                setHkd(value ? (parseFloat(value) / rate).toFixed(2) : '');
            };

            return (
                <div className="bg-white rounded-2xl shadow-lg p-8">
                    <h2 className="text-2xl font-bold text-gray-800 mb-6">💱 匯率換算</h2>
                    
                    <div className="space-y-6">
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                港幣金額 (HKD)
                            </label>
                            <input
                                type="number"
                                value={hkd}
                                onChange={(e) => handleHkdChange(e.target.value)}
                                placeholder="輸入港幣..."
                                className="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-lg"
                            />
                        </div>

                        <div className="text-center">
                            <div className="inline-block bg-blue-100 text-blue-800 px-4 py-2 rounded-lg">
                                當前匯率: 1 HKD = {rate} TWD
                            </div>
                        </div>

                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                台幣金額 (TWD)
                            </label>
                            <input
                                type="number"
                                value={twd}
                                onChange={(e) => handleTwdChange(e.target.value)}
                                placeholder="輸入台幣..."
                                className="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-lg"
                            />
                        </div>
                    </div>
                </div>
            );
        }

        // 登入頁面
        function LoginPage({ onLogin }) {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [isRegister, setIsRegister] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!username || !password) {
                    alert('請輸入使用者名稱和密碼');
                    return;
                }

                const users = JSON.parse(localStorage.getItem('users') || '{}');
                
                if (isRegister) {
                    if (users[username]) {
                        alert('使用者名稱已存在');
                        return;
                    }
                    users[username] = { password, role: 'user' };
                    localStorage.setItem('users', JSON.stringify(users));
                    alert('註冊成功！請登入');
                    setIsRegister(false);
                } else {
                    if (!users[username] || users[username].password !== password) {
                        alert('使用者名稱或密碼錯誤');
                        return;
                    }
                    onLogin({ username, role: users[username].role });
                }
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 via-purple-50 to-pink-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
                        <div className="text-center mb-8">
                            <div className="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                                <MapPin className="w-10 h-10 text-white" />
                            </div>
                            <h1 className="text-3xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
                                旅行規劃師
                            </h1>
                            <p className="text-gray-600 mt-2">
                                {isRegister ? '建立新帳號' : '登入你的帳號'}
                            </p>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">
                                    使用者名稱
                                </label>
                                <input
                                    type="text"
                                    value={username}
                                    onChange={(e) => setUsername(e.target.value)}
                                    className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                    placeholder="輸入使用者名稱"
                                />
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">
                                    密碼
                                </label>
                                <input
                                    type="password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                    placeholder="輸入密碼"
                                />
                            </div>

                            <button
                                type="submit"
                                className="w-full bg-gradient-to-r from-blue-500 to-purple-600 text-white py-3 rounded-lg font-semibold hover:shadow-lg transition-all"
                            >
                                {isRegister ? '註冊' : '登入'}
                            </button>
                        </form>

                        <div className="mt-6 text-center">
                            <button
                                onClick={() => setIsRegister(!isRegister)}
                                className="text-blue-600 hover:text-blue-800"
                            >
                                {isRegister ? '已有帳號？登入' : '沒有帳號？註冊'}
                            </button>
                        </div>

                        <div className="mt-6 p-4 bg-gray-50 rounded-lg text-sm text-gray-600">
                            <p className="font-semibold mb-2">測試帳號：</p>
                            <p>管理員: admin / admin123</p>
                            <p>使用者: user / user123</p>
                        </div>
                    </div>
                </div>
            );
        }

        // 主應用程式
        function TravelApp() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('checklist');
            const [todoItems, setTodoItems] = useState([]);
            const [packingItems, setPackingItems] = useState([]);
            const [itinerary, setItinerary] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [splitBill, setSplitBill] = useState({ members: [], expenses: [] });

            // 初始化測試帳號
            useEffect(() => {
                const users = JSON.parse(localStorage.getItem('users') || '{}');
                if (Object.keys(users).length === 0) {
                    users['admin'] = { password: 'admin123', role: 'admin' };
                    users['user'] = { password: 'user123', role: 'user' };
                    localStorage.setItem('users', JSON.stringify(users));
                }
            }, []);

            // 載入使用者資料
            useEffect(() => {
                if (user) {
                    const userData = JSON.parse(localStorage.getItem(`userData_${user.username}`) || '{}');
                    setTodoItems(userData.todoItems || [
                        { id: 1, text: '訂機票', completed: true, priority: true },
                        { id: 2, text: '訂飯店', completed: true, priority: true },
                        { id: 3, text: '申請港簽', completed: false, priority: true }
                    ]);
                    setPackingItems(userData.packingItems || [
                        { id: 1, text: '充電線', completed: false },
                        { id: 2, text: '行充', completed: false },
                        { id: 3, text: '梳子', completed: false }
                    ]);
                    setItinerary(userData.itinerary || []);
                    setExpenses(userData.expenses || []);
                    setSplitBill(userData.splitBill || { members: [], expenses: [] });
                }
            }, [user]);

            // 儲存使用者資料
            const saveUserData = () => {
                if (user) {
                    const userData = {
                        todoItems,
                        packingItems,
                        itinerary,
                        expenses,
                        splitBill
                    };
                    localStorage.setItem(`userData_${user.username}`, JSON.stringify(userData));
                }
            };

            useEffect(() => {
                saveUserData();
            }, [todoItems, packingItems, itinerary, expenses, splitBill]);

            if (!user) {
                return <LoginPage onLogin={setUser} />;
            }

            const todoProgress = todoItems.length > 0 
                ? Math.round((todoItems.filter(item => item.completed).length / todoItems.length) * 100)
                : 0;

            const packingProgress = packingItems.length > 0
                ? Math.round((packingItems.filter(item => item.completed).length / packingItems.length) * 100)
                : 0;

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 via-purple-50 to-pink-50">
                    {/* Header */}
                    <header className="bg-white shadow-md sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 py-4">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
                                        <MapPin className="w-6 h-6 text-white" />
                                    </div>
                                    <h1 className="text-2xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
                                        旅行規劃師
                                    </h1>
                                </div>
                                <div className="flex items-center gap-4">
                                    <span className="text-sm text-gray-600">
                                        歡迎, <strong>{user.username}</strong>
                                        {user.role === 'admin' && ' (管理員)'}
                                    </span>
                                    <button
                                        onClick={() => setUser(null)}
                                        className="flex items-center gap-2 px-3 py-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors"
                                    >
                                        <LogOut className="w-4 h-4" />
                                        登出
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Navigation */}
                    <div className="max-w-7xl mx-auto px-4 py-6">
                        <div className="bg-white rounded-xl shadow-sm p-2 flex gap-2 overflow-x-auto">
                            {[
                                { id: 'checklist', name: '準備清單', icon: CheckSquare },
                                { id: 'itinerary', name: '行程規劃', icon: Calendar },
                                { id: 'expenses', name: '記帳本', icon: DollarSign },
                                { id: 'currency', name: '匯率換算', icon: DollarSign },
                                { id: 'split', name: '分帳本', icon: Users }
                            ].map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`flex items-center gap-2 px-4 py-2 rounded-lg transition-all whitespace-nowrap ${
                                        activeTab === tab.id
                                            ? 'bg-gradient-to-r from-blue-500 to-purple-600 text-white shadow-md'
                                            : 'text-gray-600 hover:bg-gray-100'
                                    }`}
                                >
                                    <tab.icon className="w-4 h-4" />
                                    {tab.name}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="max-w-7xl mx-auto px-4 pb-12">
                        {/* 準備清單 */}
                        {activeTab === 'checklist' && (
                            <div className="space-y-6">
                                {/* 待辦事項 */}
                                <div className="bg-white rounded-2xl shadow-lg p-8">
                                    <div className="flex justify-between items-center mb-4">
                                        <h2 className="text-2xl font-bold text-gray-800">📋 待辦清單 TO-DO</h2>
                                        <span className="text-sm text-gray-600">進度: {todoProgress}%</span>
                                    </div>
                                    <div className="w-full bg-gray-200 rounded-full h-2 mb-6">
                                        <div 
                                            className="bg-gradient-to-r from-blue-500 to-purple-600 h-2 rounded-full transition-all"
                                            style={{ width: `${todoProgress}%` }}
                                        />
                                    </div>
                                    
                                    <div className="space-y-3 mb-4">
                                        {todoItems.map(item => (
                                            <div key={item.id} className="flex items-center gap-3 p-3 border border-gray-200 rounded-lg hover:bg-gray-50">
                                                <input
                                                    type="checkbox"
                                                    checked={item.completed}
                                                    onChange={() => {
                                                        setTodoItems(todoItems.map(i => 
                                                            i.id === item.id ? { ...i, completed: !i.completed } : i
                                                        ));
                                                    }}
                                                    className="w-5 h-5 text-blue-600"
                                                />
                                                <span className={item.completed ? 'line-through text-gray-400' : ''}>
                                                    {item.text}
                                                </span>
                                                {item.priority && <span className="text-red-500">⭐</span>}
                                            </div>
                                        ))}
                                    </div>

                                    <button
                                        onClick={() => {
                                            const text = prompt('新增待辦事項:');
                                            if (text) {
                                                setTodoItems([...todoItems, {
                                                    id: Date.now(),
                                                    text,
                                                    completed: false,
                                                    priority: false
                                                }]);
                                            }
                                        }}
                                        className="flex items-center gap-2 px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600"
                                    >
                                        <Plus className="w-4 h-4" />
                                        新增項目
                                    </button>
                                </div>

                                {/* 整理行李 */}
                                <div className="bg-white rounded-2xl shadow-lg p-8">
                                    <div className="flex justify-between items-center mb-4">
                                        <h2 className="text-2xl font-bold text-gray-800">🎒 整理行李 PACKING</h2>
                                        <span className="text-sm text-gray-600">進度: {packingProgress}%</span>
                                    </div>
                                    <div className="w-full bg-gray-200 rounded-full h-2 mb-6">
                                        <div 
                                            className="bg-gradient-to-r from-green-500 to-teal-600 h-2 rounded-full transition-all"
                                            style={{ width: `${packingProgress}%` }}
                                        />
                                    </div>
                                    
                                    <div className="grid md:grid-cols-2 gap-3 mb-4">
                                        {packingItems.map(item => (
                                            <div key={item.id} className="flex items-center gap-3 p-3 border border-gray-200 rounded-lg hover:bg-gray-50">
                                                <input
                                                    type="checkbox"
                                                    checked={item.completed}
                                                    onChange={() => {
                                                        setPackingItems(packingItems.map(i => 
                                                            i.id === item.id ? { ...i, completed: !i.completed } : i
                                                        ));
                                                    }}
                                                    className="w-5 h-5 text-green-600"
                                                />
                                                <span className={item.completed ? 'line-through text-gray-400' : ''}>
                                                    {item.text}
                                                </span>
                                            </div>
                                        ))}
                                    </div>

                                    <button
                                        onClick={() => {
                                            const text = prompt('新增行李項目:');
                                            if (text) {
                                                setPackingItems([...packingItems, {
                                                    id: Date.now(),
                                                    text,
                                                    completed: false
                                                }]);
                                            }
                                        }}
                                        className="flex items-center gap-2 px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600"
                                    >
                                        <Plus className="w-4 h-4" />
                                        新增項目
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* 行程規劃 */}
                        {activeTab === 'itinerary' && (
                            <div className="bg-white rounded-2xl shadow-lg p-8">
                                <h2 className="text-2xl font-bold text-gray-800 mb-6">🗓️ 行程規劃</h2>
                                <p className="text-gray-600 text-center py-12">
                                    行程規劃功能開發中... 
                                    <br />
                                    將包含時間軸、地點詳情、交通資訊等
                                </p>
                            </div>
                        )}

                        {/* 記帳本 */}
                        {activeTab === 'expenses' && (
                            <div className="bg-white rounded-2xl shadow-lg p-8">
                                <h2 className="text-2xl font-bold text-gray-800 mb-6">💰 記帳小幫手</h2>
                                
                                <div className="mb-6 p-4 bg-blue-50 rounded-lg">
                                    <div className="text-sm text-blue-600 mb-1">總支出</div>
                                    <div className="text-3xl font-bold text-blue-900">
                                        NT$ {expenses.reduce((sum, e) => sum + e.amount, 0).toLocaleString()}
                                    </div>
                                </div>

                                <div className="space-y-3 mb-6">
                                    {expenses.map(expense => (
                                        <div key={expense.id} className="flex justify-between items-center p-4 border border-gray-200 rounded-lg">
                                            <div>
                                                <div className="font-semibold">{expense.name}</div>
                                                <div className="text-sm text-gray-600">{expense.category}</div>
                                            </div>
                                            <div className="text-lg font-bold text-green-600">
                                                NT$ {expense.amount.toLocaleString()}
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {expenses.length === 0 && (
                                    <p className="text-gray-400 text-center py-8">還沒有記帳記錄</p>
                                )}

                                <button
                                    onClick={() => {
                                        const name = prompt('項目名稱:');
                                        if (!name) return;
                                        const amount = prompt('金額 (TWD):');
                                        if (!amount) return;
                                        const category = prompt('類別 (如: 交通、餐飲、住宿):');
                                        
                                        setExpenses([...expenses, {
                                            id: Date.now(),
                                            name,
                                            amount: parseFloat(amount),
                                            category: category || '其他'
                                        }]);
                                    }}
                                    className="flex items-center gap-2 px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600"
                                >
                                    <Plus className="w-4 h-4" />
                                    新增支出
                                </button>
                            </div>
                        )}

                        {/* 匯率換算 */}
                        {activeTab === 'currency' && <CurrencyConverter />}

                        {/* 分帳本 */}
                        {activeTab === 'split' && (
                            <div className="bg-white rounded-2xl shadow-lg p-8">
                                <h2 className="text-2xl font-bold text-gray-800 mb-6">👥 多人分帳本</h2>
                                <p className="text-gray-600 text-center py-12">
                                    多人分帳功能開發中...
                                    <br />
                                    將包含成員管理、費用分攤、欠款計算等
                                </p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TravelApp />);
    </script>
</body>
</html>
